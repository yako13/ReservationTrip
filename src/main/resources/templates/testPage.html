<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>

<a th:href="@{/reservation}">예약페이지</a>
<a th:href="@{/reservation/Complete}">예약완료페이지</a>
<br>
<a th:href="@{/dib}">찜목록</a>
<br>
<a th:href="@{/member/reservationDetail}">예약상세</a>
<br>
<a th:href="@{/package/details}">패키지 상세</a>

<a th:href="@{/member/edit}">회원수정페이지</a>
<a id="withdrawalBtn">회원 탈퇴</a>
<a th:href="@{/member/reservation/list}">주문리스트</a>
<a th:href="@{/admin/reservation/list}">관리자주문리스트</a>
<a th:href="@{/member/review/new}">회원리뷰등록</a>
<a th:href="@{/member/review/list/able}">회원등록가능리뷰</a>

<script>
    document.addEventListener("DOMContentLoaded", () => {
      const cancelBtn = document.getElementById("withdrawalBtn");

      if (cancelBtn) {
        cancelBtn.addEventListener("click", () => {
          var answer = confirm("회원 탈퇴를 하시면, 복구가 어려운 점을 참고하시기 바랍니다. 정말 탈퇴를 원하시나요?");

          if (answer) {
            window.location.assign("/permit/withdrawal");
          }
        });
      } else {
        console.error("cancelBtn을 찾을 수 없습니다.");
      }
    });
</script>



</body>
</html>
