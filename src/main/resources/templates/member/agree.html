<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <style>
        main{
            background-color: #f1f0f1;
        }

        .container {
            box-sizing: border-box;
            margin: 5rem auto;
            display: flex;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            width: 70%;
            background-color: white;
            /* border: 1px solid #ccc; */
            padding: 5rem;
            /* box-shadow: 0 4px 6px rgba(0, 0, 0, 0.295); */
        }

        .bar {
            margin: 2rem auto;
            display: flex;
            justify-content: center;
            width: 100%;
            font-size: 1.2rem;

            div {
                border: #818181 1px solid;
                width: 33%;
                background-color: #ccc;

                &:first-child {
                    border-right: none;
                    background-color: #818181;
                    color: white;
                }

                &:last-child {
                    border-left: none;
                }
            }
        }

        .agreeArea {
            text-align: start;

            span {
                font-size: 1.2rem;
            }
        }

        textarea {
            resize: none;
            color: black;
            border: 1px solid #ccc;
            outline: none;
            width: 100%;
            height: 7rem;
        }

        .textArea {
            padding: 1rem 0;
        }

        .allAgree,
        .termsAgree,
        .privacyAgree {
            margin: 1rem 0;
        }

        .btn {
            margin: 0 auto;
            width: 10rem;
            height: 2rem;
            background-color: #43bff8;
            color: #ffffff;
            border: none;
            border-radius: 7px;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            border-radius: 4px;

            &:hover {
                background-color: #3e8cf1;
                color: #ebebeb;
                transform: scale(0.98);
            }
        }

        .red {
            color: red;
        }
    </style>
</head>

<body>
    <main>
        <div class="container">
            <div class="titleArea">
                <h1>회원가입</h1>
            </div>
            <div class="bar">
                <div>
                    <p>약관동의</p>
                </div>
                <div>
                    <p>정보 입력</p>
                </div>
                <div>
                    <p>가입 완료</p>
                </div>
            </div>
            <div class="agreeArea">
                <div class="allAgree">
                    <i class="fa-regular fa-circle-check fa-xl" id="check01"></i>
                    <span>전체동의</span>

                </div>
                <div class="termsAgree">
                    <i class="fa-regular fa-circle-check fa-xl" id="check02"></i>
                    <span class="red">[필수]</span><span>이용약관</span>
                    <div class="textArea">
                        <textarea>여러분을 환영합니다.냥만여행 서비스 및 제품(이하 ‘서비스’)을 이용해 주셔서 감사합니다. 냥만여행의 회원가입을 위해 아래의 이용약관을 확인하시고 동의해 주세요.
제1조 (목적)
이 약관은 '냥만여행'에서 제공하는 온라인 여행 패키지 서비스(이하 "서비스")를 이용하는 회원의 권리, 의무 및 책임 사항을 규정합니다.
제2조 (회원가입)
회원가입은 반드시 본 약관에 동의한 후, 개인정보를 제공하여 회원가입 신청을 완료한 후 진행됩니다. 회원가입을 신청함으로써, 회원은 본 약관에 동의한 것으로 간주됩니다.
제3조 (개인정보 수집 및 이용)
회원가입 시 제공되는 개인정보는 '냥만여행'의 서비스 제공을 위한 최소한의 정보만을 수집하며, 제공된 개인정보는 관련 법령에 따라 보호됩니다. 회원은 언제든지 개인정보를 수정하거나 삭제할 수 있습니다.
제4조 (회원의 의무)
회원은 본 약관 및 법령을 준수하여야 하며, 타인의 권리를 침해하거나 불법적인 활동을 하지 않아야 합니다.
제5조 (서비스 이용)
회원은 '냥만여행'의 서비스를 정상적으로 이용할 수 있으며, 재화 또는 용역을 구매하거나 판매하는 거래를 체결할 수 있습니다. 단, 서비스 이용에 따른 책임은 회원에게 있습니다.
제6조 (회원 탈퇴 및 자격 제한)
회원은 언제든지 탈퇴를 요청할 수 있으며, '냥만여행'은 회원의 탈퇴를 즉시 처리합니다. 회원이 본 약관을 위반한 경우, '냥만여행'은 회원 자격을 제한하거나 정지할 수 있습니다.
제7조 (회원 탈퇴 후 개인정보 보관)
'냥만여행'은 회원 탈퇴 후 개인정보를 관련 법령에 따라 6개월 간 보관할 수 있으며, 이후에는 개인정보를 즉시 파기합니다. 다만, 법령에 의해 일정 기간 보관이 의무화된 개인정보는 해당 기간 동안 보관할 수 있습니다. 개인정보 파기 방법은 안전한 방식으로 처리되며, 이에 대한 상세한 사항은 개인정보 처리방침에 명시됩니다.
제8조 (약관의 변경)
'냥만여행'은 서비스 개선 및 법령 개정에 따라 본 약관을 변경할 수 있으며, 변경된 약관은 적용일자 전후로 공지됩니다. 변경된 약관은 회원이 동의한 것으로 간주됩니다.
제9조 (면책조항)
'냥만여행'은 천재지변 등 불가항력적인 사유로 인한 서비스 중단에 대해 책임을 지지 않습니다. 또한, 회원의 부주의로 인한 피해에 대해서도 책임을 지지 않습니다.
제10조 (기타사항)
이 약관에 명시되지 않은 사항은 관련 법령 및 '냥만여행'의 정책에 따릅니다.</textarea>
                    </div>
                </div>
                <div class="privacyAgree">
                    <i class="fa-regular fa-circle-check fa-xl" id="check03"></i>
                    <span class="red">[필수]</span><span>개인정보취급방침</span>
                    <div class="textArea">
                        <textarea>개인정보보호법에 따라 구름별 공방에 회원가입 신청하시는 분께 수집하는 개인정보의 항목, 개인정보의 수집 및 이용목적, 개인정보의 보유 및 이용기간, 동의 거부권 및 동의 거부 시 불이익에 관한 사항을 안내 드리오니 자세히 읽은 후 동의하여 주시기 바랍니다.
1. 수집하는 개인정보이용자가 회원제 서비스를 이용하기 위해 회원가입을 할 경우, 구름별 공방은 서비스 이용을 위해 필요한 최소한의 개인정보를 수집합니다.회원가입 시점에 네이버가 이용자로부터 수집하는 개인정보는 아래와 같습니다.
회원 가입 시 필수항목으로 아이디, 비밀번호, 이름, 휴대전화번호, 생년월일, 이메일, 성별을 수집합니다. - 회원정보 또는 개별 서비스에서 프로필 정보(프로필 사진)를 설정할 수 있습니다.
2. 수집한 개인정보의 이용
구름별 공방 서비스의 회원관리, 서비스 개발・제공 및 향상, 안전한 인터넷 이용환경 구축 등 아래의 목적으로만 개인정보를 이용합니다.
회원 가입 의사의 확인,이용자 식별, 회원탈퇴 의사의 확인 등 회원관리를 위하여 개인정보를 이용합니다.
유료 서비스 제공에 따르는 구매 및 결제, 상품 및 서비스의 배송을 위하여 개인정보를 이용합니다.
보안, 프라이버시, 안전 측면에서 이용자가 안심하고 이용할 수 있는 서비스 이용환경 구축을 위해 개인정보를 이용합니다.
3. 개인정보의 보관기간
회사는 이용자의 개인정보를 회원 탈퇴 시 6개월 간 보관하고 있습니다.
4. 개인정보 수집 및 이용 동의를 거부할 권리
이용자는 개인정보의 수집 및 이용 동의를 거부할 권리가 있습니다. 회원가입 시 수집하는 최소한의 개인정보, 즉, 필수 항목에 대한 수집 및 이용 동의를 거부하실 경우, 회원가입이 어려울 수 있습니다.</textarea>
                    </div>
                </div>
            </div>
            <button class="btn">확인</button>
        </div>
    </main>
    <script>
        // 약관 동의 시작
        let bol = true;
        let check01 = document.getElementById("check01");
        let check02 = document.getElementById("check02");
        let check03 = document.getElementById("check03");

        let privacyAgreement = document.getElementById("privacyAgreement");
        let termsAgreement = document.getElementById("termsAgreement");

        function check() {
            bol = !bol;
        }

        check01.addEventListener("click", () => {
            if (bol) {
                check01.className = "fa-solid fa-circle-check fa-xl";
                check02.className = "fa-solid fa-circle-check fa-xl";
                check03.className = "fa-solid fa-circle-check fa-xl";
                check();
                termsAgreement.value = true;
                privacyAgreement.value = true;
            } else {
                check01.className = "fa-regular fa-circle-check fa-xl";
                check02.className = "fa-regular fa-circle-check fa-xl";
                check03.className = "fa-regular fa-circle-check fa-xl";
                check();
                termsAgreement.value = false;
                privacyAgreement.value = false;
            }
        });

        let bol2 = true;
        function bol_2() {
            bol2 = !bol2;
        }

        let bol3 = true;
        function bol_3() {
            bol3 = !bol3;
        }

        check02.addEventListener("click", () => {
            if (bol2) {
                check02.className = "fa-solid fa-circle-check fa-xl";
                termsAgreement.value = true;
            } else {
                check02.className = "fa-regular fa-circle-check fa-xl";
                termsAgreement.value = false;
            }
            bol_2();
            updateAllCheck();
        });

        check03.addEventListener("click", () => {
            if (bol3) {
                check03.className = "fa-solid fa-circle-check fa-xl";
                privacyAgreement.value = true;
            } else {
                check03.className = "fa-regular fa-circle-check fa-xl";
                privacyAgreement.value = false;
            }
            bol_3();
            updateAllCheck();
        });

        function updateAllCheck() {
            if (
                check02.className === "fa-solid fa-circle-check fa-xl" &&
                check03.className === "fa-solid fa-circle-check fa-xl"
            ) {
                check01.className = "fa-solid fa-circle-check fa-xl";
                bol = false;
            } else if (
                check02.className === "fa-regular fa-circle-check fa-xl" &&
                check03.className === "fa-regular fa-circle-check fa-xl"
            ) {
                check01.className = "fa-regular fa-circle-check fa-xl";
                bol = true;
            }
        }


        // 약관동의 끝

        document.querySelector(".btn").addEventListener("click", () => {
            // 필수 약관 체크 여부 확인
            const isTermsChecked = check02.classList.contains("fa-solid");
            const isPrivacyChecked = check03.classList.contains("fa-solid");

            if (!isTermsChecked || !isPrivacyChecked) {
                alert("필수 약관에 동의해야 회원가입을 진행할 수 있습니다.");
                return; // 이동 차단
            }

            // 동의하면 다음 페이지로 이동
            sessionStorage.setItem("agreedToTerms", "true"); // 동의 정보 저장
            window.location.href = "/join"; // 회원가입 페이지로 이동
        });
    </script>
</body>

</html>
