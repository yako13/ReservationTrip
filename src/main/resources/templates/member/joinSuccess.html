<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>냥만여행 회원가입</title>
    <style>


        .container {
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            background-color: white;
            /* border: 1px solid #ccc; */
            /* box-shadow: 0 4px 6px rgba(0, 0, 0, 0.295); */
        }

        .innerContainer{
            background-color: #f1f0f1;
        }
        .bar {
            margin: 0rem auto;
            display: flex;
            justify-content: center;
            width: 70%;
            font-size: 1.2rem;

            div {
                border: #818181 1px solid;
                width: 33%;
                background-color: #ccc;

                &:first-child {
                    border-right: none;
                }

                &:nth-child(2) {}

                &:last-child {
                    border-left: none;
                    background-color: #818181;
                    color: white;
                }
            }
        }

        .messageArea {
            border-radius: 4px;
            width: 20rem;
            background-color: #ffffff;
            margin: 5rem auto;
            height: 7rem;
            padding: 4rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.295);

            p {
                margin-bottom: 3rem;
                font-weight: 600;
            }

            a:hover{
                font-weight: 600;
            }
        }

        a{
            color: black;
            text-decoration: none;
        }
    </style>
</head>

<body>
<main>
    <div class="container">
        <div class="titleArea">
            <h1>회원가입</h1>
        </div>
        <div class="bar">
            <div>
                <p>약관동의</p>
            </div>
            <div>
                <p>정보 입력</p>
            </div>
            <div>
                <p>가입 완료</p>
            </div>
        </div>
        <div class="innerContainer">
            <div class="messageArea">
                <p> 🎉 회원가입이 완료되었습니다.</p>
                <a th:href="@{/login}">로그인</a>
            </div>
        </div>
    </div>
</main>
</body>

</html>
