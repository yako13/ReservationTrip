<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <link th:href="@{/css/admin/header.css}" rel="stylesheet" />
  </head>
  <style>
    @font-face {
      font-family: "SUIT-Regular";
      src: url("https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2")
        format("woff2");
      font-weight: normal;
      font-style: normal;
    }

    * {
      font-family: "SUIT-Regular";
    }
    .main {
      margin-top: 50px;
    }
    body {
      margin: 0;
    }
    table {
      border: 1px #a39485 solid;
      font-size: 0.9em;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
      width: 100%;
      border-collapse: collapse;
      border-radius: 5px;
      overflow: hidden;
    }

    th {
      text-align: left;
    }

    .hover-tr:hover td {
      background-color: #f0e8e1;
      transition: background-color 0.3s ease;
    }

    thead {
      font-weight: bold;
      color: #fff;
      background: #73685d;
    }

    td,
    th {
      padding: 1em 0.5em;
      vertical-align: middle;
    }

    td {
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      background: #fff;
    }
    li {
      list-style: none;
    }
    .pagination {
      margin: 1rem;
      display: flex;
      justify-content: center;
      padding: 2rem 0;
    }
    .pagination .page-item {
      margin: 0 5px;
    }
    .pagination .page-link {
      color: #73685d;
      border-radius: 8px;
      padding: 8px 12px;
      transition: all 0.2s ease-in-out;
    }
    .pagination .page-link:hover {
      background-color: #c9b49f;
      color: white;
    }
    .pagination .active .page-link {
      background-color: #a59584;
      color: white;
      border: none;
    }
    .pagination .disabled .page-link {
      color: #ccc;
      pointer-events: none;
      background-color: #f8f9fa;
    }
    .btn-submit {
      background-color: #ffffff;
      border: 0px;
      cursor: pointer;
    }
    .form__search {
      display: flex;
      border: 1px solid #111111;
      border-radius: 7px;
      width: 12rem;
      height: 2rem;
      margin-bottom: 1rem;
      justify-content: center;
      flex-direction: column;
      flex-wrap: wrap;
    }
    .searchForm {
      width: 9rem;
      border: 0px;
      height: 1.5rem;
      font-size: 1rem;
      margin-left: 0.5rem;
    }
    .searchForm:focus {
      outline: none;
    }
    .orderList {
      height: 70px;
      text-align: left;

      p {
        padding-top: 30px;
      }
    }
    #red {
      color: red;
    }
    .alarm {
      display: flex;
      flex-direction: row;
      z-index: 50;
    }

    #closeIcon {
      margin: 0;
      text-align: end;
      font-size: 1.2rem;
      height: 1.5rem;
    }
    .btn1 {
      border: 0;
      border-radius: 7px;
      cursor: pointer;
      font-size: 16px;
      padding: 10px;
      min-width: 80px;
    }
    .btn-new {
      background-color: #4ed5a2;
      color: #ffffff;
      width: 80px;
      &:hover {
        background-color: #40c592;
      }
    }
    .btn-edit {
      background-color: #afdfff;
      color: #ffffff;
      &:hover {
        background-color: #7ec7f7;
      }
    }
    .btn-delete {
      background-color: #ff8080;
      color: #ffffff;
      &:hover {
        background-color: #ee5757;
      }
    }
    .btnAndSearch {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .sort__container {
      display: flex;
      float: right;
      gap: 10px;
    }
    select {
      font-size: 1rem;
    }
    .text__right {
      align-self: center;
    }
    .packageList {
      font-size: 18px;
    }
    .image__set {
      height: 70px;
    }
  </style>
  <body>
    <header th:replace="fragments/adminHeader::masterHeader"></header>
    <nav th:replace="fragments/adminHeader::masterNav"></nav>
    <main id="main" class="main">
      <div>
        <div class="orderList">
          <p><b>등록 내역</b> : <b id="red">[[${page.totalElements}]]</b>건</p>
        </div>
        <div>
          <div class="btnAndSearch">
            <button
              type="button"
              class="btn1 btn-new"
              onclick="location.href='/admin/package/new'">
              등록
            </button>
            <div class="form__search">
              <div>
                <form
                  action="/admin/package/search/index"
                  method="get"
                  role="search">
                  <input
                    type="text"
                    class="searchForm"
                    placeholder="상품명을 입력하세요."
                    name="keyword" />
                  <button class="btn-submit" type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                  </button>
                </form>
              </div>
            </div>
          </div>
          <div class="sort__container">
            <div>
              <form action="/admin/package/list" method="get" id="filterForm">
                <select id="mainCategory" name="mainCategoryId">
                  <option value="" selected>대분류</option>
                </select>
                <select id="subCategory" name="subCategoryId">
                  <option value="">중분류</option>
                </select>
                <select id="smallCategory" name="smallCategoryId">
                  <option value="">소분류</option>
                </select>
              </form>
            </div>
            <select name="sizeSelect" id="sizeSelect" onchange="">
              <option value="10" th:selected="${size==10}">10개</option>
              <option value="20" th:selected="${size==20}">20개</option>
              <option value="30" th:selected="${size==30}">30개</option>
            </select>

            <select name="sortSelect" id="sortSelect" onchange="">
              <option value="default" th:selected="${sortSelect == 'default'}">
                최신순
              </option>
              <option
                value="price_asc"
                th:selected="${sortSelect == 'price_asc'}">
                가격낮은순
              </option>
              <option
                value="price_desc"
                th:selected="${sortSelect == 'price_desc'}">
                가격높은순
              </option>
            </select>
            <span th:if="${page.totalElements != 0}" class="text__right">
              <span th:text="${page.totalElements + '건의 상품 / '}"></span>
              <span
                th:text="${(page.number + 1) + (page.number * size) - page.totalPages + (page.totalPages - page.number)}"></span>
              -
              <span
                th:text="${(page.number * size) + #lists.size(page.content) + '건'}"></span>
            </span>
            <span th:unless="${page.totalElements != 0}" class="text__right">
              <span>0건의 상품</span>
            </span>
          </div>
          <div th:unless="${page.totalElements != 0}" class="text__center">
            <h3>등록하신 상품이 없습니다.</h3>
          </div>
          <table th:if="${page.totalElements != 0}">
            <thead class="packageList">
              <tr>
                <th>순번</th>
                <th>이미지</th>
                <th style="min-width: 190px">상품명</th>
                <th>가격</th>
                <th>출발지</th>
                <th>도착지</th>
                <th>출국일자</th>
                <th>귀국일자</th>
                <th>예약상태</th>
                <th>생성일자</th>
                <th>수정일자</th>
                <th>수정</th>
                <th>삭제</th>
              </tr>
            </thead>
            <!-- 테이블은 동적오로 js로 생성함 -->
            <tbody id="packageList" class="packageList">
              <tr th:each="aPackage : ${packageList}">
                <td th:text="${aPackage.id}"></td>
                <td>
                  <img th:src="${aPackage.mainImagePath}" class="image__set" />
                </td>
                <td th:text="${aPackage.name}"></td>
                <td th:text="${aPackage.fuelSurchargeIncluded}"></td>
                <td th:text="${aPackage.departurePointOut}"></td>
                <td th:text="${aPackage.arrivalPointOut}"></td>
                <td th:text="${aPackage.departureDateOut}"></td>
                <td th:text="${aPackage.arrivalDateReturn}"></td>
                <td th:text="${aPackage.packageStatus}"></td>
                <td th:text="${aPackage}"></td>
                <td th:text="${aPackage.createdAt}"></td>
                <td th:text="${aPackage.modifiedAt}"></td>
                <td>
                  <button
                    type="button"
                    class="btn1 btn-edit"
                    th:onclick="|location.href='/admin/package/edit/' + ${aPackage.id}|">
                    수정하기
                  </button>
                </td>
                <td>
                  <button type="button" class="btn1 btn-delete">
                    삭제하기
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <!-- 페이지네이션 -->
        <nav
          aria-label="Page navigation"
          th:unless="${page.totalElements == 0}">
          <ul class="pagination">
            <!-- 첫 페이지 버튼 -->
            <li
              class="page-item"
              th:classappend="${page.first} ? 'disabled' : ''">
              <a
                class="page-link"
                th:href="@{/admin/package/list(page=0, size=${size})}"
                aria-label="First">
                <span>&laquo;</span>
              </a>
            </li>

            <!-- 이전 버튼 -->
            <li
              class="page-item"
              th:classappend="${page.hasPrevious()} ? '' : 'disabled'">
              <a
                class="page-link"
                th:href="@{/admin/package/list(page=${currentPage - 1}, size=${size})}"
                aria-label="Previous">
                <span>&lt;</span>
              </a>
            </li>

            <!-- 페이지 번호 -->
            <li
              class="page-item"
              th:each="pageNum : ${#numbers.sequence(currentPage - 2 > 0 ? currentPage - 2 : 0,
                                                 currentPage + 2 < page.totalPages - 1 ? currentPage + 2 : page.totalPages - 1)}"
              th:classappend="${pageNum == currentPage} ? 'active' : ''">
              <a
                class="page-link"
                th:href="@{/admin/package/list(page=${pageNum}, size=${size})}"
                th:text="${pageNum + 1}"></a>
            </li>

            <!-- 다음 버튼 -->
            <li
              class="page-item"
              th:classappend="${page.hasNext()} ? '' : 'disabled'">
              <a
                class="page-link"
                th:href="@{/admin/package/list(page=${currentPage + 1}, size=${size})}"
                aria-label="Next">
                <span>&gt;</span>
              </a>
            </li>

            <!-- 마지막 페이지 버튼 -->
            <li
              class="page-item"
              th:classappend="${page.last} ? 'disabled' : ''">
              <a
                class="page-link"
                th:href="@{/admin/package/list(page=${page.totalPages - 1}, size=${size})}"
                aria-label="Last">
                <span>&raquo;</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </main>
  </body>
</html>
<script th:src="@{/js/adminNav.js}"></script>
<script>
  async function loadCategories() {
    const response = await fetch("/api/categories");
    const data = await response.json();

    const mainCategorySelect = document.getElementById("mainCategory");
    resetSelect(mainCategorySelect, "대분류");

    data.forEach((mainCategory) => {
      const option = document.createElement("option");
      option.value = mainCategory.id;
      option.textContent = mainCategory.name;
      mainCategorySelect.appendChild(option);
    });

    mainCategorySelect.addEventListener("change", () => {
      const selected = data.find((c) => c.id == mainCategorySelect.value);
      loadSubCategories(selected?.children || []);
      fetchFilteredList(); // 필터링된 리스트 호출
    });
  }

  function loadSubCategories(subCategories) {
    const subCategorySelect = document.getElementById("subCategory");
    resetSelect(subCategorySelect, "중분류");

    const smallCategorySelect = document.getElementById("smallCategory");
    resetSelect(smallCategorySelect, "소분류");

    subCategories.forEach((subCategory) => {
      const option = document.createElement("option");
      option.value = subCategory.id;
      option.textContent = subCategory.name;
      subCategorySelect.appendChild(option);
    });

    subCategorySelect.addEventListener("change", () => {
      const selected = subCategories.find(
        (c) => c.id == subCategorySelect.value
      );
      loadSmallCategories(selected?.children || []);
      fetchFilteredList();
    });
  }

  function loadSmallCategories(smallCategories) {
    const smallCategorySelect = document.getElementById("smallCategory");
    resetSelect(smallCategorySelect, "소분류");

    smallCategories.forEach((smallCategory) => {
      const option = document.createElement("option");
      option.value = smallCategory.id;
      option.textContent = smallCategory.name;
      smallCategorySelect.appendChild(option);
    });

    smallCategorySelect.addEventListener("change", fetchFilteredList);
  }

  function resetSelect(selectElement, placeholderText) {
    selectElement.innerHTML = "";
    const option = document.createElement("option");
    option.value = "";
    option.textContent = placeholderText;
    option.disabled = false;
    option.selected = true;
    selectElement.appendChild(option);
  }

  async function fetchFilteredList() {
    const mainId = document.getElementById("mainCategory").value;
    const subId = document.getElementById("subCategory").value;
    const smallId = document.getElementById("smallCategory").value;

    const params = new URLSearchParams();
    if (mainId) params.append("mainCategoryId", mainId);
    if (subId) params.append("subCategoryId", subId);
    if (smallId) params.append("smallCategoryId", smallId);

    const response = await fetch(
      `/admin/package/list/json?${params.toString()}`
    );
    const data = await response.json();

    renderPackageList(data.content);
  }

  function renderPackageList(packages) {
    const container = document.getElementById("packageList");
    container.innerHTML = "";

    if (packages.length === 0) {
      container.innerHTML = '<tr><td colspan="12">결과가 없습니다.</td></tr>';
      return;
    }

    packages.forEach((package) => {
      const tr = document.createElement("tr");
      tr.classList.add("hover-tr");
      tr.innerHTML = `
      <td>${package.id}</td>
      <td><img src="${package.mainImagePath}" class="image__set"/></td>
      <td>${package.name}</td>
      <td>${package.fuelSurchargeIncluded}</td>
      <td>${package.departurePointOut}</td>
      <td>${package.arrivalPointOut}</td>
      <td>${package.departureDateOut}</td>
      <td>${package.arrivalDateReturn}</td>
      <td>${package.packageStatus}</td>
      <td>${package.createdAt}</td>
      <td>${package.modifiedAt}</td>
      <td><button type="button" class="btn1 btn-edit" data-id="${package.id}">수정하기</button></td>
      <td><button type="button" class="btn1 btn-delete">삭제하기</button></td>
    `;
      container.appendChild(tr);
    });
  }

  // 이벤트 위임으로 수정 버튼 클릭 처리
  document.addEventListener("click", function (e) {
    if (e.target.classList.contains("btn-edit")) {
      const id = e.target.dataset.id;
      if (id) {
        location.href = "/admin/package/edit/" + id;
      }
    }
  });

  document.addEventListener("DOMContentLoaded", async () => {
    await loadCategories();
    await fetchFilteredList(); // 초기 데이터도 표시
  });

  // sort 관련 설정
  const sizeSelect = document.getElementById("sizeSelect");
  const sortSelect = document.getElementById("sortSelect");
  const categorySelect = document.getElementById("categorySelect");

  const currentSize = `[[${size}]]`;
  const currentSort = `[[${sortSelect}]]`;
  const currentCategory = `[[${categorySelect}]]`;

  sizeSelect.addEventListener("change", function () {
    const selectedSize = this.value;
    window.location.href = `/admin/package/list?page=0&size=${selectedSize}&sort=${currentSort}`;
  });

  sortSelect.addEventListener("change", function () {
    const selectedSort = this.value;
    window.location.href = `/admin/package/list?page=0&size=${currentSize}&sort=${selectedSort}`;
  });
  categorySelect.addEventListener("change", function () {
    const selectedCategory = this.value;
    window.location.href = `/admin/package/list/?page=0&size=${currentSize}&sort=${currentSort}`;
    // window.location.href = `/amdin/package/list/category?category=${selectedCategory}&page=0&size=${currentSize}&sort=${currentSort}`;
  });
</script>
