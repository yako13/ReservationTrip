<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <style>
    body {
      padding: 1.5em;
      background: #f5f5f5;
    }
    table {
      border: 1px #a39485 solid;
      font-size: 0.9em;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
      width: 100%;
      border-collapse: collapse;
      border-radius: 5px;
      overflow: hidden;
    }

    th {
      text-align: left;
    }

    thead {
      font-weight: bold;
      color: #fff;
      background: #73685d;
    }

    td,
    th {
      padding: 1em 0.5em;
      vertical-align: middle;
    }

    td {
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      background: #fff;
    }
  </style>
  <body>
    <h1>package list</h1>
    <main>
      <div>
        <table>
          <thead>
            <tr>
              <th>순번</th>
              <th>이미지</th>
              <th>상품명</th>
              <th>가격</th>
              <th>출발지</th>
              <th>도착지</th>
              <th>출국일자</th>
              <th>귀국일자</th>
              <th>여행기간</th>
              <th>수정</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="package : ${packageList}">
              <td th:text="${package.id}"></td>
              <td>
                <img th:src="${package.mainImagePath}" height="100px" />
              </td>
              <td th:text="${package.name}"></td>
              <td th:text="${package.fuelSurchargeIncluded}"></td>
              <td th:text="${package.departurePointOut}"></td>
              <td th:text="${package.arrivalPointOut}"></td>
              <td th:text="${package.departureDateOut}"></td>
              <td th:text="${package.arrivalDateReturn}"></td>
              <td th:text="${package.period}"></td>
              <td><button type="button">수정하기</button></td>
              <td><button type="button">삭제하기</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
