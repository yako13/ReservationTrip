<body>
  <br />
  <header th:replace="fragments/adminHeader::masterHeader"></header>
  <nav th:replace="fragments/adminHeader::masterNav"></nav>
  <main id="main" class="main">
    <div class="main__container">

      <div class="HanPackTop">
        <p class="AdminPackTitleP2">상품 수정</p>
        <hr class="PackNewHr">
      </div>

      <div class="a1">
        <form th:action="@{/admin/package/edit/{id}(id=${package.id})}" method="post" onsubmit="return doAction()"
          enctype="multipart/form-data">
          <div>
            <span class="qqq">
              <select name="aPackage.packageStatus">
                <option value="AVAILABLE" th:selected="${package.packageStatus.name == '예약가능'}">
                  예약가능
                </option>
                <option value="CLOSED" th:selected="${package.packageStatus.name == '예약불가'}">
                  예약불가
                </option>
                <option value="CANCEL" th:selected="${package.packageStatus.name == '여행취소'}">
                  여행취소
                </option>
              </select>
            </span>
            <input type="hidden" id="hiddenPackageScheduleId" name="packageScheduleId" />
            <!-- 상품 기본 정보 -->
            <p class="AdminPackTitleP">상품 기본 정보</p>
          </div>
          <div class="a6">
            <div class="a2">
              <div class="input__flex">
                <label>상품명</label>
                <input type="text" name="aPackage.packageName" th:value="${package.packageName}" class="HanPackInput" />
              </div>

              <div class="input__flex">
                <label>성인 1인당 가격</label>
                <input type="text" name="aPackage.adultPrice" id="adultPrice" th:value="${package.adultPrice}"
                  class="HanPackInput" />
              </div>
              <div class="input__flex">
                <label>유류할증료</label>
                <input type="text" name="aPackage.fuelSurcharge" id="fuelSurcharge" th:value="${package.fuelSurcharge}"
                  class="HanPackInput" />
              </div>
              <div class="input__flex">
                <label>아동 1인당 가격</label>
                <input type="text" name="aPackage.childPrice" id="childPrice" readonly class="input-gray HanPackInput"
                  th:value="${package.childPrice}" />
              </div>
              <div class="input__flex">
                <label>유아 1인당 가격</label>
                <input type="text" name="aPackage.babyPrice" id="babyPrice" readonly class="input-gray HanPackInput"
                  th:value="${package.babyPrice}" />
              </div>

              <div class="input__flex">
                <label>유류할증료 포함 1인당 가격</label>
                <input type="text" name="aPackage.fuelSurchargeIncluded" id="fuelSurchargeIncluded" readonly
                  class="input-gray HanPackInput" th:value="${package.fuelSurchargeIncluded}" />
              </div>

              <input type="hidden" id="deletedImages" name="deletedImages" value="" />

              <!-- 모달창 -->
              <div id="imageModal" class="modal" style="display: none">

                <div class="modal-content">
                  <span class="close" onclick="closeImageModal()">&times;</span>
                  <h3 style="margin-bottom: 20px; margin-top: 10px; text-align: center; font-size: 25px;">이미지 첨부 및 미리보기
                  </h3>

                  <!-- 메인 이미지 -->
                  <div class="imgModalDiv1">

                    <label style="font-size: 18px;">메인 이미지</label>

                    <div class="imgModalDiv3">

                      <input type="file" id="mainImage" name="aPackage.mainImage" accept="image/*"
                        onchange="previewSingleImage(event, 'mainImagePreview', 'mainImage')"
                        style="display: none" /><br />

                      <div id="mainImagePreview" class="preview-container">
                        <div class="mainImageContainer" id="existingMainImage">
                          <img
                            th:src="@{/productImages/{uuid}{fileExtension} (uuid=${package.mainImage.uuid}, fileExtension=${package.mainImage.fileExtension})}"
                            class="thumbnail" />
                        </div>
                      </div>

                    </div>

                    <label for="mainImage" class="custom-file-btn" style="margin-top: 4px;">파일 선택</label>

                  </div>

                  <!-- 서브 이미지 -->

                  <div class="imgModalDiv1">

                    <label style="font-size: 18px;">서브 이미지</label>

                    <div class="imgModalDiv3">

                      <input type="file" id="subImage" name="aPackage.subImage" accept="image/*" multiple
                        onchange="previewMultipleImages(event, 'subImagePreview', 5, 'subImage')"
                        style="display: none" /><br />

                      <div class="subImageContainer" id="existingSubImage" style="width: 100%;">
                        <div class="preview-container" id="subImagePreview">
                          <div id="subImageContainer-[[${iterStat.index}]]" th:each="sub, iterStat : ${subImage}"
                            class="image-container" style="display: flex; justify-content: flex-start;">
                            <img th:src="@{${sub}}" class="thumbnail" />
                            <button class="btn-delete" type="button"
                              th:attr="onclick=|deleteExistingImage(this, [[${iterStat.index}]], 'subImage')|">
                              <i class="fa-solid fa-square-xmark" style="color: #ff0000"></i>
                            </button>
                          </div>
                        </div>
                      </div>

                    </div>

                    <label for="subImage" class="custom-file-btn" style="margin-top: 4px;">파일 선택</label>

                  </div>

                  <!-- 설명 이미지 -->

                  <div class="imgModalDiv1">

                    <label style="font-size: 18px;">설명 이미지</label>

                    <div class="imgModalDiv3">

                      <input type="file" id="descImage" name="aPackage.descImage" accept="image/*" multiple
                        onchange="previewMultipleImages(event, 'descImagePreview', 5, 'descImage')"
                        style="display: none" /><br />

                      <div id="descImagePreview" class="preview-container">
                        <div id="descImagePreview-[[${iterStat.index}]]" th:each="desc, iterStat : ${descImage} "
                          class="image-container">
                          <img th:src="@{${desc}}" class="thumbnail" />
                          <button type="button" class="btn-delete"
                            th:attr="onclick=|deleteExistingImage(this, [[${iterStat.index}]], 'descImage')|">
                            <i class="fa-solid fa-square-xmark" style="color: #ff0000"></i>
                          </button>
                        </div>

                      </div>

                    </div>

                    <label for="descImage" class="custom-file-btn" style="margin-top: 4px;">파일 선택</label>

                  </div>

                  <div class="hanButtonDiv3">

<script>
  const adultPrice = document.getElementById("adultPrice");
  const childPrice = document.getElementById("childPrice");
  const babyPrice = document.getElementById("babyPrice");
  const fuelSurcharge = document.getElementById("fuelSurcharge");
  const fuelSurchargeIncluded = document.getElementById(
    "fuelSurchargeIncluded"
  );

  // 각 가격 값을 가져와서 숫자로 변환 후, 소수점 뒤 .00 제거
  function removeDecimal(value) {
    // .toFixed(0)으로 소수점 아래 자리를 제거하고 숫자로 다시 변환
    let numericValue = parseFloat(value).toFixed(0);
    return numericValue;
  }

  // 값 처리하여 .00 제거
  let adultPriceValue = removeDecimal(adultPrice.value || adultPrice.innerText);
  let childPriceValue = removeDecimal(childPrice.value || childPrice.innerText);
  let babyPriceValue = removeDecimal(babyPrice.value || babyPrice.innerText);
  let fuelSurchargeValue = removeDecimal(
    fuelSurcharge.value || fuelSurcharge.innerText
  );
  let fuelSurchargeIncludedValue = removeDecimal(
    fuelSurchargeIncluded.value || fuelSurchargeIncluded.innerText
  );

  // 값 다시 돌려주기 (input 요소의 value에 설정)
  adultPrice.value = adultPriceValue;
  childPrice.value = childPriceValue;
  babyPrice.value = babyPriceValue;
  fuelSurcharge.value = fuelSurchargeValue;
  fuelSurchargeIncluded.value = fuelSurchargeIncludedValue;

  console.log(
    adultPrice.value,
    childPrice.value,
    babyPrice.value,
    fuelSurcharge.value,
    fuelSurchargeIncluded.value
  );

  // 스크롤바 크기 계산
  function getBodyScrollbarWidth() {
    return window.innerWidth - document.documentElement.clientWidth;
  }

  // 일정 팝업창 열기
  function openScheduleModal(className = "overflow-hidden") {
    document.getElementById("scheduleModal").style.display = "block";
    document.body.style.setProperty(
      "--scrollbar-width",
      getBodyScrollbarWidth() + "px"
    );
    document.body.style.overflow = "hidden";
    document.body.classList.add(className);
  }
  function closeScheduleModal() {
    document.getElementById("scheduleModal").style.display = "none";
    document.body.classList.remove("overflow-hidden");
    document.body.style.removeProperty("overflow");
    document.body.style.removeProperty("--scrollbar-width");
  }

  document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") {
      const modal = document.getElementById("scheduleModal");
      if (modal && modal.style.display === "block") {
        closeScheduleModal();
      }
    }
  });

  function openScheduleCheckModal(className = "overflow-hidden") {
    document.getElementById("scheduleCheckModal").style.display = "block";
    document.body.style.setProperty(
      "--scrollbar-width",
      getBodyScrollbarWidth() + "px"
    );
    document.body.style.overflow = "hidden";
    document.body.classList.add(className);
  }
  function closeScheduleCheckModal() {
    document.getElementById("scheduleCheckModal").style.display = "none";
    document.body.classList.remove("overflow-hidden");
    document.body.style.removeProperty("overflow");
    document.body.style.removeProperty("--scrollbar-width");
  }

  document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") {
      const modal = document.getElementById("scheduleCheckModal");
      if (modal && modal.style.display === "block") {
        closeScheduleCheckModal();
      }
    }
  });

  // 이미지 팝업창 열기
  function openImageModal(className = "overflow-hidden") {
    document.getElementById("imageModal").style.display = "block";
    document.body.style.setProperty(

  // 서브, 설명 이미지 미리보기 기능 (동적 추가)
  const newImageIndex = {};

  function previewMultipleImages(event, previewId, maxImages, type) {
    const previewContainer = document.getElementById(previewId);
    const files = event.target.files;

    if (!previewContainer || !files) return;

    // newImageIndex[type]가 없으면 초기화
    if (!newImageIndex[type]) {
      newImageIndex[type] = 0;
    }

    for (let i = 0; i < files.length; i++) {
      if (previewContainer.childElementCount >= maxImages) {
        alert(`최대 ${maxImages}개의 이미지만 업로드할 수 있습니다.`);
        break;
      }

      const file = files[i];
      const reader = new FileReader();
      const currentIndex = newImageIndex[type]++;

      reader.onload = function (e) {
        const imageContainer = document.createElement("div");
        imageContainer.classList.add("image-container");
        imageContainer.classList.add(`${type}-image-container`); // text
        imageContainer.id = `new${type}-${currentIndex}`;

        const img = document.createElement("img");
        img.src = e.target.result;
        img.classList.add("thumbnail");

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.innerHTML =
          '<i class="fa-solid fa-square-xmark" style="color: #ff0000;"></i>';
        deleteButton.className = "btn-delete";
        deleteButton.onclick = function () {
          deleteNewImage(currentIndex, type);
        };

        imageContainer.appendChild(img);
        imageContainer.appendChild(deleteButton);
        previewContainer.appendChild(imageContainer);
      };

      reader.readAsDataURL(file);
    }
  }

          let hiddenInput = document.createElement("input");
          hiddenInput.type = "hidden";

    // 아동 및 유아 가격 계산

    const babyPrice = (adultPrice * 0.1).toFixed(0);

    // 출발일 반영
    datePickerOut.setDate(startDate);
    document.getElementById("departureDateOut").value =
      formatDateWithWeekday(startDate);

    // 귀국일 계산 및 반영
    const returnDate = new Date(startDate);
    returnDate.setDate(returnDate.getDate() + period - 1);
    datePickerReturn.setDate(returnDate);
    document.getElementById("departureDateReturn").value =
      formatDateWithWeekday(returnDate);
  });

  // setLast를 수동으로 선택한 경우 귀국일 직접 지정
  datePickerSetLast.on("change", () => {
    const endDate = datePickerSetLast.getDate();
    if (!endDate) return;

    datePickerReturn.setDate(endDate);
    document.getElementById("departureDateReturn").value =
      formatDateWithWeekday(endDate);
  });

  // 출발일 수동 선택 시에도 포맷 적용
  datePickerOut.on("change", () => {
    const date = datePickerOut.getDate();
    document.getElementById("departureDateOut").value =
      formatDateWithWeekday(date);
  });

  // 귀국일 수동 선택 시에도 포맷 적용
  datePickerReturn.on("change", () => {
    const date = datePickerReturn.getDate();
    document.getElementById("departureDateReturn").value =
      formatDateWithWeekday(date);
  });

  // 카테고리 값이 없으면 기존 값
  document
    .getElementById("mainCategory")
    .addEventListener("change", function () {
      const hiddenInput = document.getElementById("hiddenMainCategoryId");

      if (this.value === "") {
        hiddenInput.disabled = false;
      } else {
        hiddenInput.disabled = true;
      }
    });

  ["subCategory", "smallCategory"].forEach((id) => {
    const select = document.getElementById(id);
    const hidden = document.getElementById(
      `selected${id.charAt(0).toUpperCase()}${id.slice(1)}`
    );

    select.addEventListener("change", function () {
      if (this.value === "") {
        hidden.disabled = false;
      } else {
        hidden.disabled = true;
      }
    });
  });
</script>
