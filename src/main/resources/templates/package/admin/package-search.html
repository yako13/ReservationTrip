<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <title>🐾냥만여행 상품 패키지 목록</title>
    <link th:href="@{/css/admin/header.css}" rel="stylesheet" />
  </head>
  <style>
    @font-face {
      font-family: "SUIT-Regular";
      src: url("https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2")
        format("woff2");
      font-weight: normal;
      font-style: normal;
    }

    * {
      font-family: "SUIT-Regular";
    }
    .main {
      margin-top: 50px;
    }
    body {
      margin: 0;
    }
    table {
      border: 1px #a39485 solid;
      font-size: 0.9em;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
      width: 100%;
      border-collapse: collapse;
      border-radius: 5px;
      overflow: hidden;
    }

    th {
      text-align: left;
    }

    .hover-tr:hover td {
      background-color: #f0e8e1;
      transition: background-color 0.3s ease;
    }

    thead {
      font-weight: bold;
      color: #fff;
      background: #73685d;
    }

    td,
    th {
      padding: 1em 0.5em;
      vertical-align: middle;
    }

    td {
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      background: #fff;
    }
    li {
      list-style: none;
    }
    .pagination {
      margin: 1rem;
      display: flex;
      justify-content: center;
      padding: 2rem 0;
    }
    .pagination .page-item {
      margin: 0 5px;
    }
    .pagination .page-link {
      color: #73685d;
      border-radius: 8px;
      padding: 8px 12px;
      transition: all 0.2s ease-in-out;
    }
    .pagination .page-link:hover {
      background-color: #c9b49f;
      color: white;
    }
    .pagination .active .page-link {
      background-color: #a59584;
      color: white;
      border: none;
    }
    .pagination .disabled .page-link {
      color: #ccc;
      pointer-events: none;
      background-color: #f8f9fa;
    }
    .btn-submit {
      background-color: #ffffff;
      border: 0px;
      cursor: pointer;
    }
    .form__search {
      display: flex;
      border: 1px solid #111111;
      border-radius: 7px;
      width: 12rem;
      height: 2rem;
      margin-bottom: 1rem;
      justify-content: center;
      flex-direction: column;
      flex-wrap: wrap;
    }
    .searchForm {
      width: 9rem;
      border: 0px;
      height: 1.5rem;
      font-size: 1rem;
      margin-left: 0.5rem;
    }
    .searchForm:focus {
      outline: none;
    }
    .orderList {
      height: 70px;
      text-align: left;

      p {
        padding-top: 30px;
      }
    }
    #red {
      color: red;
    }
    .alarm {
      display: flex;
      flex-direction: row;
      z-index: 50;
    }

    #closeIcon {
      margin: 0;
      text-align: end;
      font-size: 1.2rem;
      height: 1.5rem;
    }
    .btn1 {
      border: 0;
      border-radius: 7px;
      cursor: pointer;
      font-size: 16px;
      padding: 10px;
      min-width: 80px;
    }
    .btn-new {
      background-color: #4ed5a2;
      color: #ffffff;
      width: 80px;
      &:hover {
        background-color: #40c592;
      }
    }
    .btn-edit {
      background-color: #afdfff;
      color: #ffffff;
      &:hover {
        background-color: #7ec7f7;
      }
    }
    .btn-delete {
      background-color: #ff8080;
      color: #ffffff;
      &:hover {
        background-color: #ee5757;
      }
    }
    .btnAndSearch {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .sort__container {
      display: flex;
      float: right;
      gap: 10px;
    }
    select {
      font-size: 1rem;
    }
    .text__right {
      align-self: center;
    }
    .packageList {
      font-size: 17px;
    }
    .image__set {
      height: 70px;
      width: 70px;
      object-fit: cover;
      cursor: pointer;
    }
    .detailsLink {
      cursor: pointer;
      width: 150px;
      max-width: 200px;
    }
    a {
      color: #111111;
    }

    #infoImage {
      width: 8rem;
    }

    .imageArea {
      padding: 5rem 0;
      text-align: center;
      border-bottom: solid 1px #c2c2c2;
    }

    .inner {
      padding: 60px 40px;
    }
    .tr-size {
      max-width: 130px;
    }
  </style>
  <body>
    <input type="hidden" id="flashMessage8" th:value="${data}" />
    <header th:replace="fragments/adminHeader::masterHeader"></header>
    <nav th:replace="fragments/adminHeader::masterNav"></nav>
    <main id="main" class="main">
      <div class="inner">
        <h2
          th:if="${keywordQuery!=null}"
          th:text="'검색어 : '+ ${keywordQuery}"
          class="search-name"></h2>
        <hr />
        <div class="orderList">
          <p>
            <b>등록 내역</b> :
            <!-- 정적 데이터 -->
            <b class="red" id="staticTotal">[[${page.totalElements}]]</b>
            <!-- 동적 데이터 -->
            <b id="redTotalCount" class="red"></b>
            <span>건</span>
          </p>
        </div>
        <div>
          <div class="btnAndSearch">
            <button
              type="button"
              class="btn1 btn-new"
              onclick="location.href='/admin/package/new'">
              등록
            </button>
            <input
              type="hidden"
              th:value="${keywordQuery}"
              id="keywordQuery"
              name="keywordQuery" />
            <div class="form__search">
              <div>
                <form
                  action="/admin/package/search/index"
                  method="get"
                  role="search">
                  <input
                    type="text"
                    class="searchForm"
                    placeholder="상품명을 입력하세요."
                    name="keyword"
                    th:value="${keywordQuery}" />
                  <button class="btn-submit" type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                  </button>
                </form>
              </div>
            </div>
          </div>
          <div class="sort__container">
            <div>
              <form action="/admin/package/list" method="get" id="filterForm">
                <input
                  type="hidden"
                  name="keyword"
                  th:value="${keywordQuery}" />
                <select id="mainCategory" name="mainCategoryId">
                  <option value="" selected>대분류</option>
                </select>
                <select id="subCategory" name="subCategoryId">
                  <option value="">중분류</option>
                </select>
                <select id="smallCategory" name="smallCategoryId">
                  <option value="">소분류</option>
                </select>
              </form>
            </div>
            <select name="size" id="size" onchange="">
              <option value="5" th:selected="${size==5}">5개</option>
              <option value="10" th:selected="${size==10}">10개</option>
              <option value="20" th:selected="${size==20}">20개</option>
              <option value="30" th:selected="${size==30}">30개</option>
            </select>

            <select name="sort" id="sort" onchange="">
              <option value="default" th:selected="${sort == 'default'}">
                출발 빠른순
              </option>
              <option value="price_asc" th:selected="${sort == 'price_asc'}">
                가격 낮은순
              </option>
              <option value="price_desc" th:selected="${sort == 'price_desc'}">
                가격 높은순
              </option>
              <option
                value="createdAt_desc"
                th:selected="${sort == 'createdAt_desc'}">
                최근 등록순
              </option>
              <option
                value="createdAt_asc"
                th:selected="${sort == 'createdAt_asc'}">
                나중 등록순
              </option>
            </select>
            <!-- 동적 데이터 -->
            <span id="resultCount" class="text__right"></span>
            <!-- 정적 데이터 -->
            <span
              th:if="${page.totalElements != 0}"
              id="staticTotal2"
              class="text__right">
              <span th:text="${page.totalElements + '건의 상품 / '}"></span>
              <span
                th:text="${(page.number + 1) + (page.number * size) - page.totalPages + (page.totalPages - page.number)}"></span>
              -
              <span
                th:text="${(page.number * size) + #lists.size(page.content) + '건'}"></span>
            </span>
            <span th:unless="${page.totalElements != 0}" class="text__right">
              <span>0건의 상품</span>
            </span>
          </div>
          <div th:unless="${page.totalElements != 0}" class="imageArea">
            <img th:src="@{/images/info.svg}" id="infoImage" />
            <p>예약내역이 없습니다.</p>
          </div>
          <!-- 정적 데이터 -->
          <div id="staticList">
            <table th:if="${page.totalElements != 0}">
              <thead>
                <tr>
                  <th>순번</th>
                  <th>이미지</th>
                  <th>상품명</th>
                  <th>가격</th>
                  <th>출발지</th>
                  <th>도착지</th>
                  <th>출국일자</th>
                  <th>귀국일자</th>
                  <th>예약상태</th>
                  <th>생성일자</th>
                  <th>수정일자</th>
                  <th>수정</th>
                  <th>삭제</th>
                </tr>
              </thead>
              <tbody id="packageList" class="packageList">
                <tr th:each="aPackage : ${packageList}">
                  <td th:text="${aPackage.id}"></td>
                  <td>
                    <a th:href="@{/package/details/{id}(id=${aPackage.id})}">
                      <img
                        th:src="${aPackage.mainImagePath}"
                        class="image__set"
                    /></a>
                  </td>
                  <td class="detailsLink">
                    <a
                      th:href="@{/package/details/{id}(id=${aPackage.id})}"
                      th:text="${aPackage.name}"></a>
                  </td>
                  <td th:text="${aPackage.fuelSurchargeIncluded}"></td>
                  <td th:text="${aPackage.departurePointOut}"></td>
                  <td
                    th:text="${aPackage.arrivalPointOut}"
                    class="tr-size"></td>
                  <td th:text="${aPackage.departureDateOut}"></td>
                  <td th:text="${aPackage.arrivalDateReturn}"></td>
                  <td th:text="${aPackage.packageStatus}"></td>
                  <td th:text="${aPackage.createdAt}"></td>
                  <td th:text="${aPackage.modifiedAt}"></td>
                  <td>
                    <button
                      type="button"
                      class="btn1 btn-edit"
                      th:onclick="|location.href='/admin/package/edit/' + ${aPackage.id}|">
                      수정하기
                    </button>
                  </td>
                  <td>
                    <button
                      type="button"
                      th:data-name="${aPackage.name}"
                      th:data-id="${aPackage.id}"
                      class="btn1 btn-delete">
                      삭제하기
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <!-- 동적 데이터 -->
          <div id="dynamicList" style="display: none">
            <table th:if="${page.totalElements != 0}">
              <thead>
                <tr>
                  <th>순번</th>
                  <th>이미지</th>
                  <th>상품명</th>
                  <th>가격</th>
                  <th>출발지</th>
                  <th>도착지</th>
                  <th>출국일자</th>
                  <th>귀국일자</th>
                  <th>예약상태</th>
                  <th>생성일자</th>
                  <th>수정일자</th>
                  <th>수정</th>
                  <th>삭제</th>
                </tr>
              </thead>
              <!-- js 에서 테이블은 동적오로 생성하는 부분 -->
              <tbody id="dynamicTableBody" class="packageList"></tbody>
            </table>
          </div>
        </div>
        <!-- js 에서 페이지를 동적으로 생성하는 부분 -->
        <div id="pagination"></div>
        <!-- 페이지네이션 -->
        <nav
          id="staticPagination"
          aria-label="Page navigation"
          th:unless="${page.totalElements == 0}">
          <ul class="pagination">
            <!-- 첫 페이지 버튼 -->
            <li
              class="page-item"
              th:classappend="${page.first} ? 'disabled' : ''">
              <a
                class="page-link"
                th:href="@{/admin/package/search/index(keyword=${keywordQuery}, page=0, size=${size})}"
                aria-label="First">
                <span>&laquo;</span>
              </a>
            </li>

            <!-- 이전 버튼 -->
            <li
              class="page-item"
              th:classappend="${page.hasPrevious()} ? '' : 'disabled'">
              <a
                class="page-link"
                th:href="@{/admin/package/search/index(keyword=${keywordQuery}, page=${currentPage - 1}, size=${size})}"
                aria-label="Previous">
                <span>&lt;</span>
              </a>
            </li>

            <!-- 페이지 번호 -->
            <li
              class="page-item"
              th:each="pageNum : ${#numbers.sequence(currentPage - 2 > 0 ? currentPage - 2 : 0,
                                                 currentPage + 2 < page.totalPages - 1 ? currentPage + 2 : page.totalPages - 1)}"
              th:classappend="${pageNum == currentPage} ? 'active' : ''">
              <a
                class="page-link"
                th:href="@{/admin/package/search/index(keyword=${keywordQuery}, page=${pageNum}, size=${size})}"
                th:text="${pageNum + 1}"></a>
            </li>

            <!-- 다음 버튼 -->
            <li
              class="page-item"
              th:classappend="${page.hasNext()} ? '' : 'disabled'">
              <a
                class="page-link"
                th:href="@{/admin/package/search/index(keyword=${keywordQuery}, page=${currentPage + 1}, size=${size})}"
                aria-label="Next">
                <span>&gt;</span>
              </a>
            </li>

            <!-- 마지막 페이지 버튼 -->
            <li
              class="page-item"
              th:classappend="${page.last} ? 'disabled' : ''">
              <a
                class="page-link"
                th:href="@{/admin/package/search/index(keyword=${keywordQuery}, page=${page.totalPages - 1}, size=${size})}"
                aria-label="Last">
                <span>&raquo;</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </main>
  </body>
</html>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:src="@{/js/adminNav.js}"></script>

<!-- 수정한 부분 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    await loadCategories();

    // check if elements exist before adding event listeners
    const searchForm = document.getElementById("searchForm");
    if (searchForm) {
      searchForm.addEventListener("submit", function (e) {
        e.preventDefault();
        fetchFilteredList(0); // 검색어 반영된 fetch 호출
        enableDynamicMode();
      });
    }

    const filterForm = document.getElementById("filterForm");
    if (filterForm) {
      filterForm.addEventListener("submit", function (e) {
        e.preventDefault(); // 폼 제출 막기
        fetchFilteredList(); // 대신 Ajax 호출
      });
    }

    const subCategorySelect = document.getElementById("subCategory");
    if (subCategorySelect) {
      subCategorySelect.addEventListener("change", () => {
        const selected = subCategories.find(
          (c) => c.id == subCategorySelect.value
        );
        loadSmallCategories(selected?.children || []);
        fetchFilteredList(0);
        enableDynamicMode();
      });
    }

    const smallCategorySelect = document.getElementById("smallCategory");
    if (smallCategorySelect) {
      smallCategorySelect.addEventListener("change", () =>
        fetchFilteredList(0)
      );
    }

    const sortSelect = document.getElementById("sort");
    if (sortSelect) {
      sortSelect.addEventListener("change", () => fetchFilteredList(0));
    }

    const sizeSelect = document.getElementById("size");
    if (sizeSelect) {
      sizeSelect.addEventListener("change", () => fetchFilteredList(0));
    }
  });

  document.getElementById("subCategory").addEventListener("change", () => {
    const selected = subCategories.find((c) => c.id == subCategorySelect.value);
    loadSmallCategories(selected?.children || []);
    fetchFilteredList(0);
    enableDynamicMode();
  });

  document
    .getElementById("smallCategory")
    .addEventListener("change", () => fetchFilteredList(0));
  document
    .getElementById("sort")
    .addEventListener("change", () => fetchFilteredList(0));
  document
    .getElementById("size")
    .addEventListener("change", () => fetchFilteredList(0));

  async function loadCategories() {
    const response = await fetch("/api/categories");
    const data = await response.json();

    const mainCategorySelect = document.getElementById("mainCategory");
    resetSelect(mainCategorySelect, "대분류");

    data.forEach((mainCategory) => {
      const option = document.createElement("option");
      option.value = mainCategory.id;
      option.textContent = mainCategory.name;
      mainCategorySelect.appendChild(option);
    });

    // 메인 카테고리 선택 시 동작
    document
      .getElementById("mainCategory")
      .addEventListener("change", async function () {
        const mainId = this.value;

        if (mainId) {
          // 동적 리스트 fetch
          const response = await fetch(
            `/admin/package/search/json?mainCategoryId=${mainId}`
          );
          const data = await response.json();

          toggleListView(true);
          renderPackageList(data.content);
          renderPagination(data);
        } else {
          toggleListView(false);
        }
      });

    const newMain = mainCategorySelect.cloneNode(true);
    mainCategorySelect.replaceWith(newMain);

    newMain.addEventListener("change", () => {
      const selected = data.find((c) => c.id == newMain.value);
      loadSubCategories(selected?.children || []);
      fetchFilteredList();
      enableDynamicMode();
    });
  }

  function loadSubCategories(subCategories) {
    const subCategorySelect = document.getElementById("subCategory");
    const newSub = subCategorySelect.cloneNode(true);
    subCategorySelect.replaceWith(newSub);
    resetSelect(newSub, "중분류");

    const smallCategorySelect = document.getElementById("smallCategory");
    const newSmall = smallCategorySelect.cloneNode(true);
    smallCategorySelect.replaceWith(newSmall);
    resetSelect(newSmall, "소분류");

    subCategories.forEach((subCategory) => {
      const option = document.createElement("option");
      option.value = subCategory.id;
      option.textContent = subCategory.name;
      newSub.appendChild(option);
    });

    newSub.addEventListener("change", () => {
      const selected = subCategories.find((c) => c.id == newSub.value);
      loadSmallCategories(selected?.children || []);
      fetchFilteredList();
      enableDynamicMode();
    });
  }

  function loadSmallCategories(smallCategories) {
    const smallCategorySelect = document.getElementById("smallCategory");
    const newSmall = smallCategorySelect.cloneNode(true);
    smallCategorySelect.replaceWith(newSmall);
    resetSelect(newSmall, "소분류");

    smallCategories.forEach((smallCategory) => {
      const option = document.createElement("option");
      option.value = smallCategory.id;
      option.textContent = smallCategory.name;
      newSmall.appendChild(option);
    });

    newSmall.addEventListener("change", () => {
      toggleListView(true);
      enableDynamicMode();
      fetchFilteredList();
    });
  }

  function resetSelect(selectElement, placeholderText) {
    selectElement.innerHTML = "";
    const option = document.createElement("option");
    option.value = "";
    option.textContent = placeholderText;
    option.disabled = false;
    option.selected = true;
    selectElement.appendChild(option);
  }

  async function fetchFilteredList(page = 0) {
    const keyword = document.getElementById("keywordQuery")?.value;
    const mainId = document.getElementById("mainCategory")?.value;
    const subId = document.getElementById("subCategory")?.value;
    const smallId = document.getElementById("smallCategory")?.value;
    const sort = document.getElementById("sort")?.value || "default";
    const size = document.getElementById("size")?.value || "20";

    const params = new URLSearchParams();
    params.append("page", 0); // 첫 페이지부터 시작
    params.append("size", size);
    params.append("sort", sort);
    if (keyword) params.append("keyword", keyword);
    if (mainId) params.append("mainCategoryId", mainId);
    if (subId) params.append("subCategoryId", subId);
    if (smallId) params.append("smallCategoryId", smallId);

    const response = await fetch(
      `/admin/package/search/json?${params.toString()}`
    );
    const data = await response.json();

    toggleListView(true);
    renderPackageList(data.content);
    renderPagination(data);
    updateResultCount(data);
  }

  function toggleListView(useDynamic) {
    // static
    document.getElementById("staticList").style.display = useDynamic
      ? "none"
      : "block";
    document.getElementById("staticPagination").style.display = useDynamic
      ? "none"
      : "block";
    document.getElementById("staticTotal").style.display = useDynamic
      ? "none"
      : "block";
    document.getElementById("staticTotal2").style.display = useDynamic
      ? "none"
      : "block";

    //dynamic
    document.getElementById("dynamicList").style.display = useDynamic
      ? "block"
      : "none";
    document.getElementById("pagination").style.display = useDynamic
      ? "block"
      : "none";
  }

  function updateResultCount(pageData) {
    const resultCountEl = document.getElementById("resultCount");
    const redTotalCountEl = document.getElementById("redTotalCount");

    const total = pageData.totalElements;
    const size = pageData.size;
    const currentPage = pageData.number;
    const currentContentCount = pageData.content.length;

    const start = total === 0 ? 0 : currentPage * size + 1;
    const end = currentPage * size + currentContentCount;

    resultCountEl.textContent = `${total}건의 상품 / ${start} - ${end}건`;
    redTotalCountEl.textContent = total;
  }

  function renderPackageList(packages) {
    const container = document.getElementById("dynamicTableBody");
    container.innerHTML = "";

    if (packages.length === 0) {
      container.innerHTML = '<tr><td colspan="12">결과가 없습니다.</td></tr>';
      return;
    }

    packages.forEach((package) => {
      const tr = document.createElement("tr");
      tr.classList.add("hover-tr");
      tr.dataset.id = package.id;
      tr.innerHTML = `
      <td>${package.id}</td>
      <td><img src="${package.mainImagePath}" class="image__set"/></td>
      <td class="detailsLink">${package.name}</td>
      <td>${package.fuelSurchargeIncluded}</td>
      <td>${package.departurePointOut}</td>
      <td class="tr-size">${package.arrivalPointOut}</td>
      <td>${package.departureDateOut}</td>
      <td>${package.arrivalDateReturn}</td>
      <td>${package.packageStatus}</td>
      <td>${package.createdAt}</td>
      <td>${package.modifiedAt}</td>
      <td><button type="button" class="btn1 btn-edit" data-id="${package.id}">수정하기</button></td>
      <td><button type="button" class="btn1 btn-delete" data-id="${package.id}" data-name="${package.name}">삭제하기</button></td>
    `;
      container.appendChild(tr);
    });
  }

  // 이벤트 위임으로 수정 버튼 클릭 처리
  document.addEventListener("click", function (e) {
    if (e.target.classList.contains("btn-edit")) {
      const id = e.target.dataset.id;
      if (id) {
        location.href = "/admin/package/edit/" + id;
      }
    }
  });

  document
    .getElementById("dynamicList")
    .addEventListener("click", function (e) {
      const isImageClicked = e.target.classList.contains("image__set");
      const isTextClicked = e.target.classList.contains("detailsLink");

      if (isImageClicked || isTextClicked) {
        const parentRow = e.target.closest(".hover-tr");
        const id = parentRow?.dataset.id;
        if (id) {
          location.href = "/package/details/" + id;
        }
      }
    });

  function renderPagination(pageData) {
    const pagination = document.getElementById("pagination");
    if (!pagination) return;

    pagination.innerHTML = ""; // 초기화

    const currentPage = pageData.number;
    const totalPages = pageData.totalPages;
    const size = pageData.size;

    const ul = document.createElement("ul");
    ul.className = "pagination";

    // 유틸 함수: 페이지 버튼 만들기
    const createPageItem = (label, page, disabled, isActive = false) => {
      const li = document.createElement("li");
      li.className = "page-item";
      if (disabled) li.classList.add("disabled");
      if (isActive) li.classList.add("active");

      const a = document.createElement("a");
      a.className = "page-link";
      a.href = "#";
      a.textContent = label;
      a.addEventListener("click", (e) => {
        e.preventDefault();
        if (!disabled && page !== currentPage) {
          fetchFilteredList(page); // 페이지 이동
        }
      });

      li.appendChild(a);
      return li;
    };

    const hasPrevious = pageData.number > 0;
    const hasNext = pageData.number < pageData.totalPages - 1;

    // 첫 페이지 버튼 («)
    ul.appendChild(createPageItem("«", 0, pageData.first));

    // 이전 페이지 버튼 (<)
    ul.appendChild(createPageItem("<", currentPage - 1, !hasPrevious));

    // 페이지 번호 (currentPage - 2 ~ currentPage + 2)
    const start = Math.max(currentPage - 2, 0);
    const end = Math.min(currentPage + 2, totalPages - 1);

    for (let i = start; i <= end; i++) {
      ul.appendChild(
        createPageItem((i + 1).toString(), i, false, i === currentPage)
      );
    }

    // 다음 페이지 버튼 (>)
    ul.appendChild(createPageItem(">", currentPage + 1, !hasNext));

    // 마지막 페이지 버튼 (»)
    ul.appendChild(createPageItem("»", totalPages - 1, pageData.last));

    pagination.appendChild(ul);
  }

  let currentPage = 0;

  document.addEventListener("DOMContentLoaded", async () => {
    await loadCategories();
  });

  let isDynamicMode = false; // 동적 모드 여부 판단

  function enableDynamicMode() {
    if (!isDynamicMode) {
      isDynamicMode = true;
      toggleListView(true); // 동적 리스트만 보이도록
    }
  }
</script>
