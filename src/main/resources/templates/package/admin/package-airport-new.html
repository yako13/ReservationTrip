<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>냥만여행 상품 공항생성</title>
    <link th:href="@{/css/admin/header.css}" rel="stylesheet">
    </link>
    <style>
        table {
            font-size: 12px;
        }

        .rwd-table {
            border: 1px #a39485 solid;
            font-size: 1.1rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
            width: 100%;
            border-collapse: collapse;
            border-radius: 5px;
            overflow: hidden;
        }

        .rwd-table th {
            border-top: none;
            color: white;
            background-color: #2c394b;
            width: 10rem;
        }

        .rwd-table tr {
            border-top: 1px solid #808080;
            border-bottom: 1px solid #808080;
            background-color: #ffffff;
        }

        .rwd-table tr:nth-child(odd):not(:first-child) {
            background-color: #ffffff;
        }

        .rwd-table th {
            display: none;
        }

        .rwd-table td {
            display: block;
            height: 2rem;
        }

        .rwd-table td:first-child {
            margin-top: 0.5em;
        }



        .rwd-table {
            color: #333;
            border-radius: 0.4em;
            overflow: hidden;
        }

        .rwd-table tr {
            border-color: #ccc;
        }

        .rwd-table th,
        .rwd-table td {
            padding: 0.5em 1em;
        }

        @media screen and (max-width: 601px) {
            .rwd-table tr:nth-child(2) {
                border-top: none;
            }
        }

        @media screen and (min-width: 600px) {


            .rwd-table td:before {
                display: none;
            }

            .rwd-table th,
            .rwd-table td {
                display: table-cell;
                padding: 0.25em 0.5em;
            }

            .rwd-table th:first-child,
            .rwd-table td:first-child {
                padding-left: 0;
            }

            .rwd-table th:last-child,
            .rwd-table td:last-child {
                padding-right: 0;
            }

            .rwd-table th,
            .rwd-table td {
                padding: 1em;
            }
        }

        ul {

            list-style: none;
            padding-left: 30px;
            margin-bottom: 15px;

            li {
                padding-left: 10px;
                margin-bottom: 15px;
            }

        }



        .container {
            display: block;
            min-height: 800px;
            margin-left: 32px;
            margin-right: 50px;
        }

        h2 {
            text-align: left;
            margin-top: 80px;
        }

        .innerContainer {
            padding-top: 30px;
            display: flex;
        }

        .categoryArea {
            width: 40rem;

        }

        .formArea {
            width: 100%;
            margin-left: 5rem;
        }

        #treeArea {
            border: 1px solid #8b8b8b;
            min-height: 30rem;
        }

        .categoryBtn {
            background: none;
            border: none;
            cursor: pointer;
        }

        .categoryBtnArea {
            text-align: end;
            background-color: #f4f6f8;

            button {
                font-size: 1.1rem;
                margin-top: 10px;
                padding-left: 0.5rem;
                padding-right: 1rem;

                i {
                    color: #2c394b;
                }
            }
        }

        input[type="text"] {
            width: 24rem;
            border: none;
            height: 1.5rem;
            padding: 5px;
            font-size: 1.1rem;

            &:focus {
                outline: none;
            }
        }

        [type="radio"] {
            appearance: none;
            border: max(2px, 0.1em) solid gray;
            border-radius: 50%;
            width: 1.2em;
            height: 1.2em;
            transition: border 0.2s ease-in-out;

        }

        [type="radio"]:checked {
            border: 0.6em solid #3e82ff;
        }

        [type="radio"]:focus-visible {
            outline-offset: max(4px, 0.1em);
            outline: max(2px, 0.1em) dotted #3e82ff;
        }

        [type="radio"]:hover {
            box-shadow: 0 0 0 max(2px, 0.2em) lightgray;
            cursor: pointer;
        }

        [type="radio"]:hover+span {
            cursor: pointer;
        }

        [type="radio"]:disabled {
            background-color: lightgray;
            box-shadow: none;
            opacity: 0.7;
            cursor: not-allowed;
        }

        [type="radio"]:disabled+span {
            opacity: 0.7;
            cursor: not-allowed;
        }


        label {
            margin-right: 10px;
        }

        .btnArea {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        #submitBtn {
            background-color: #43bff8;
            color: #ffffff;
            border: none;
            transition: all 0.3s ease;
            width: 7rem;
            font-size: 1.3rem;
            height: 3rem;
            border-radius: 7px;

            &:hover {
                background-color: #3e8cf1;
                color: #555252;
                transform: scale(0.98);

            }

        }

        #deleteBtn {
            background-color: #ff7979;
            color: #ffffff;
            transition: all 0.3s ease;
            border: none;
            font-size: 1.3rem;
            width: 7rem;
            height: 3rem;
            margin-left: 2rem;
            border-radius: 7px;

            &:hover {
                transform: scale(0.98);
                background-color: #ff4b4b;
            }
        }

        .tree,
        .tree ul {
            list-style: none;
            margin: 0;
            padding: 0;
            position: relative;
            font-family: sans-serif;
            font-size: 14px;
        }

        /* 세로 줄 */
        .tree ul::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0.6rem;
            bottom: 0;
            width: 1px;
            background: #ccc;
        }

        /* 트리 항목 */
        .tree li {
            position: relative;
            padding-left: 1.2rem;
            line-height: 1.6;
        }

        /* 가로 줄 */
        .tree li::before {
            content: "";
            position: absolute;
            top: 0.8em;
            left: 0.6rem;
            width: 0.6rem;
            height: 1px;
            background: #ccc;
        }

        /* 마지막 요소 아래 세로줄 안 보이게 */
        .tree li:last-child::after {
            content: "";
            position: absolute;
            left: 0.6rem;
            top: 0.8em;
            bottom: 0;
            background: white;
            width: 1px;
            z-index: 1;
        }

        .tree>li::before {
            display: none;
        }

        .node {
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .majorText {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .mediumText {
            font-size: 1rem;
            font-weight: 600;
        }

        .subText {
            font-size: 0.9rem;
            font-weight: 600;
        }

    </style>
</head>

<body>
    <header th:replace="fragments/adminHeader::masterHeader"></header>
    <nav th:replace="fragments/adminHeader::masterNav"></nav>
    <!-- 메인 시작 -->
    <main id="main">
        <div class="container">
            <h2>공항 관리</h2>
            <hr />
            <div class="innerContainer">
                <div class="categoryArea">
                    <div id="treeArea">
                        <div class="categoryBtnArea">
                            <span style="margin-right: 15rem;"><b>지역별 공항 목록</b></span>
                            <button onclick="toggleAll(true)" class="categoryBtn"><i
                                    class="fa-solid fa-bars"></i></button>
                            <button onclick="toggleAll(false)" class="categoryBtn"><i
                                    class="fa-solid fa-ellipsis-vertical"></i></button>
                            <hr>
                        </div>
                        <ul class="tree">
                            <!-- 한국 공항 -->
                            <li th:each="koreaAirport : ${koreaAirportList}">
                                <div class="node" onclick="toggle(this)">
                                    <i class="fa-solid fa-caret-down"></i>
                                    <span class="majorText" id="korea">[[${koreaAirport.sub}]]</span>
                                </div>
                                <ul class="hidden">
                                    <li th:each="airport : ${koreaAirport.airport}">[[${airport}]]</li>
                                </ul>
                            </li>

                            <!-- 해외 분류 -->
                            <li th:each="category : ${categoryList}">
                                <div class="node" onclick="toggle(this)">
                                    <i class="fa-solid fa-caret-down"></i>
                                    <span th:text="${category.major}" class="majorText"></span>
                                </div>
                                <ul>
                                    <!-- 중간 도시 목록 -->
                                    <li th:each="medium, stat : ${category.medium}">
                                        <div class="node" onclick="toggle(this)">
                                            <i class="fa-solid fa-caret-down"></i>
                                            <span th:text="${medium}" class="mediumText"></span>
                                        </div>
                                        <ul class="hidden">
                                            <!-- 소도시/공항 그룹 -->
                                            <li th:each="sub : ${category.sub[__${stat.index}__]}">
                                                <div class="node" onclick="toggle(this)">
                                                    <i class="fa-solid fa-caret-down"></i>
                                                    <span th:text="${sub.sub}" class="subText"></span>
                                                </div>
                                                <ul>
                                                    <li th:each="airport : ${sub.airport}">
                                                        <span th:text="${airport}"></span>
                                                    </li>
                                                </ul>
                                            </li>
                                        </ul>
                                    </li>
                                </ul>
                            </li>
                        </ul>

                    </div>
                </div>
                <div class="formArea">
                    <h4><i class="fa-solid fa-list-ul"></i> 공항 추가 및 삭제</h4>
                    <table class="rwd-table">
                        <form th:action="@{/admin/category/new}" th:method="post" id="categoryForm">
                            <tbody>
                                <tr>
                                    <th>공항명</th>
                                    <td><input placeholder="20자이내 한글" name="airportName" type="text" id="airportName"
                                            maxlength="20">
                                    </td>
                                </tr>
                                <tr>
                                    <th>공항코드</th>
                                    <td>
                                        <input placeholder="영문 3자" name="airportCode" type="text" id="airportCode"
                                            maxlength="3" oninput="this.value = this.value.replace(/[^a-zA-Z]/g, '')">
                                    </td>
                                </tr>
                                <tr>
                                    <th>지역명</th>
                                    <td>
                                        <input type="text" maxlength="10" placeholder="등록하거나 삭제 할 지역을 좌측 목록에서 선택해주세요."
                                            id="parentsName" name="parentsName" readonly>
                                    </td>
                                </tr>
                            </tbody>
                    </table>
                    <div class="btnArea">
                        <button type="button" id="submitBtn">등록</button>
                        <button type="button" id="deleteBtn">삭제</button>
                    </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function toggle(element) {
            element.classList.toggle("open");

            // 아이콘 방향 바꾸기
            const icon = element.querySelector("i");
            if (icon) {
                icon.classList.toggle("fa-caret-down");
                icon.classList.toggle("fa-caret-right");
            }

            // 하위 UL 토글
            let sibling = element.nextElementSibling;
            while (sibling) {
                if (sibling.tagName === "UL") {
                    sibling.classList.toggle("hidden");
                }
                sibling = sibling.nextElementSibling;
            }
        }

        function toggleAll(open) {
            document.querySelectorAll("#treeArea ul ul").forEach(ul => {
                if (open) ul.classList.remove("hidden");
                else ul.classList.add("hidden");
            });
        }

        //클릭 시 지역명 인풋에 추가
        $(".subText").click(function (event) {
            parentsName.value = event.target.innerText;
        })

        $("#korea").click(function (event) {
            parentsName.value = event.target.innerText;
        })

        //공항코드 대문자로 바꾸기
        $("#airportCode").on("input", function () {
            this.value = this.value.toUpperCase();
        });

        const name_check = /^[가-힣]{1,20}$/;


        //카테고리 등록
        $("#submitBtn").click(function () {

            if (document.getElementById("airportName").value == "") {
                Swal.fire({ text: "등록 하실 공항명을 입력해주세요." });
                return;
            }

            if (!name_check.test(document.getElementById("airportName").value)) {

                Swal.fire({ html: "공항명을 20자 이내 한글로 정확하게 입력해주세요." });
                return;
            }

            if (document.getElementById("airportCode").value == "") {
                Swal.fire({ text: "공항코드를 입력해주세요." });
                return;
            }

            if (document.getElementById("airportCode").value.length != 3) {
                Swal.fire({ text: "공항코드는 영문 3글자입니다." });
                return;
            }

            if (document.getElementById("parentsName").value == "") {
                Swal.fire({ text: "지역명은 필수입니다." });
                return;
            }

            ajax();


        })

        function ajax() {
            var params = {
                airportName: $("#airportName").val(),
                airportCode: $("#airportCode").val(),
                parentsName: $("#parentsName").val()
            }

            $.ajax({
                type: "POST",
                url: "/admin/package/airport/new",
                data: params,
                success: function (res) {
                    if (res == 1000) {
                        Swal.fire({ text: "등록이 완료되었습니다." }).then(() => {
                            location.reload();
                        });
                    }
                    else if (res == 100) {
                        Swal.fire({ text: "동일한 이름이나 코드로 등록할 수 없습니다." });
                    }
                    else if (res == 300) {
                        Swal.fire({ text: "동일한 공항을 등록하실려는 경우, 정확한 이름과 코드를 입력하셔야합니다." });
                    }
                    else if (res == 400) {
                        Swal.fire({ text: "동일한 카테고리에 등록 할 수 없습니다." });
                    }

                    else if (res == 700) {
                        Swal.fire({ text: "동일한 이름의 공항코드가 있습니다." });
                    }
                    else {
                        Swal.fire({ text: "일치하는 지역이 없습니다." }); // res == 500
                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {
                    Swal.fire({ icon: 'error', text: "통신불가." });
                }
            })
        }

        //카테고리 삭제
        $("#deleteBtn").click(deleteCategory);

        function deleteCategory() {

            if (document.getElementById("airportName").value == "" && document.getElementById("airportCode").value == "") {
                Swal.fire({ text: "공항명을 입력하거나 공항코드를 입력해주세요." });
                return;
            }
            if (document.getElementById("parentsName").value == "") {
                Swal.fire({ text: "지역명은 필수입니다." });
                return;
            }

            var params = {
                airportName: $("#airportName").val(),
                airportCode: $("#airportCode").val(),
                parentsName: $("#parentsName").val()
            }

            $.ajax({
                type: "POST",
                url: "/admin/package/airport/delete",
                data: params,
                success: function (res) {
                    if (res == 1000) {
                        Swal.fire({ text: "삭제가 완료되었습니다." }).then(() => {
                            location.reload();
                        });
                    }
                    else if (res == 100) {
                        Swal.fire({ text: "공항명과 공항코드가 일치하지 않습니다." });
                    }
                    else if (res == 300) {
                        Swal.fire({ text: "일치하는 이름의 공항이 없습니다." });
                    }
                    else if (res == 500) {
                        Swal.fire({ text: "이미 해당 공항의 패키지가 존재 할 경우 삭제가 불가합니다." });
                    }
                    else if (res == 700) {
                        Swal.fire({ text: "일치하는 코드의 공항이 없습니다." });
                    }
                    else if(res==900){
                        Swal.fire({ text: "일치하는 지역이 없습니다." }); 
                    }
                    else if(res==1100){
                        Swal.fire({ text: "해당 지역에 속한 공항이 아닙니다." }); 
                    }
                    else {
                        Swal.fire({icon: 'error',  text: "오류 발생" });
                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {
                    Swal.fire({ icon: 'error', text: "통신불가." });
                }
            })

        }



    </script>
    <script th:src="@{/js/adminNav.js}"></script>

</body>

</html>
