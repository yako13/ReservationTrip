<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>관리자 상품 등록</title>

  <style>
    .main__container {

    }
    .a1 {

    .a2 {

    .a3 {

    }
    .a4 {
    }
    .a5 {
      border: 1px solid;
      border-radius: 7px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .a6 {
      border: 1px solid;
      border-radius: 7px;

    }
    .a7 {
      border: 1px solid;
      border-radius: 7px;

    }
    .a8 {

      border-radius: 7px;

      margin-bottom: 20px;
    }
    .a9 {
      border: 1px solid;
      border-radius: 7px;

      margin-bottom: 20px;
    }
    .b1 {

    }
    .input__flex {

    }
    .b2 {
      display: flex;

    }
    .plane-time {

    }
    .image-container {
      display: flex;

    }
    .btn-delete {
      font-size: 1rem;
      border: 0px;
      border-radius: 10px;
      background-color: #ffffff;

  <body>
    <h1>상품 등록</h1>
    <main class="main__container">
      <div class="a1">
        <form
          action="/admin/package/save"
          method="post"
          onsubmit="return doAction()"
          enctype="multipart/form-data">
          <input
            type="hidden"
            id="hiddenPackageScheduleId"
            name="packageScheduleId" />
          <!-- 상품 기본 정보 -->

          <div class="a6">
            <div class="a2">

                <label>상품명</label>
                <input type="text" name="aPackage.packageName" />
              </div>
              <div class="input__flex">
                <label>예약 가능 인원수</label>
                <input type="number" name="packageSchedule.maximumMember" />
              </div>
              <div class="input__flex">
                <label>성인 1인당 가격</label>
                <input type="text" name="aPackage.adultPrice" id="adultPrice" />
              </div>
              <div class="input__flex">
                <label>아동 1인당 가격</label>

                  type="text"
                  name="aPackage.childPrice"
                  id="childPrice"
                  readonly />
              </div>
              <div class="input__flex">
                <label>유아 1인당 가격</label>
                <input
                  type="text"
                  name="aPackage.babyPrice"
                  id="babyPrice"
                  readonly />
              </div>
              <div class="input__flex">
                <label>썸네일 이미지</label>
                <input
                  type="file"
                  name="aPackage.mainImage"
                  id="mainImage"
                  accept="image/*"
                  oninput="this.form.submitButton.disabled = !this.files.length"
                  onchange="previewSingleImage(event, 'mainImagePreview', 'mainImage')" />
              </div>
              <div id="mainImagePreview" class="image-preview-container"></div>

              <div class="input__flex">
                <label>서브 이미지</label>
                <input
                  type="file"
                  id="subImage"
                  accept="image/*"

                  name="aPackage.subImage"
                  onchange="previewMultipleImages(event, 'subImagePreview', 5, 'subImage')" />
              </div>
              <div id="subImagePreview" class="image-preview-container"></div>
              <div class="input__flex">
                <label>일정이미지</label>

            <div class="a3">

                <input

          </div>
          <br />
          <!-- 여행 일정 정보 -->

          <div class="a5">
            <div class="generate__container">

              <div>

              <div>

                  id="setLast"
                  placeholder="종료일을 선택하세요"
                  readonly />

                <!-- 달력 표시용 컨테이너 -->
                <div id="tui-datepicker-setLast"></div>
              </div>
            </div>
            <div class="generateClass">
              <div class="a8">
                <span>출국일정</span>
                <div class="b2">
                  <div class="b3">
                    <div>

                      <select

                        id="departurePointOut">

                    </div>
                    <div>

                      <select
                        name="packageSchedule.arrivalPointOut"

                    </div>

                    <div>

                    </div>
                    <div>
                      <label for="flightNumberOut">항공편 번호</label>
                      <input
                        type="text"
                        name="packageSchedule.flightNumberOut"
                        id="flightNumberOut" />
                    </div>
                    <div>
                      <!-- <label for="arrivalDateOut">도착날짜</label> -->
                      <input
                        type="hidden"
                        id="arrivalDateOut"
                        name="packageSchedule.arrivalDateOut" />
                    </div>
                  </div>
                  <div class="input__flex plane-time">
                    <div>
                      <label for="departureTimeOut">출발시간</label>
                      <input
                        type="time"
                        id="departureTimeOut"
                        name="packageSchedule.departureTimeOut" />
                    </div>
                    <div>
                      <label for="arrivalTimeOut">도착시간</label>

              <!-- 귀국일정 -->

                <div class="b2">
                  <div class="b3">
                    <div style="display: none">
                      <label for="departurePointReturn">출발지</label>
                      <select
                        name="packageSchedule.departurePointReturn"
                        id="departurePointReturn">
                        <option value="#">-- 공항 선택 --</option>
                      </select>
                    </div>
                    <div style="display: none">
                      <label for="arrivalPointReturn">도착지</label>
                      <select
                        name="packageSchedule.arrivalPointReturn"
                        id="arrivalPointReturn">
                        <option value="#">-- 공항 선택 --</option>
                        <option value="1">김포국제공항</option>
                        <option value="INCHEON">인천국제공항</option>
                        <option value="DAEGU">대구국제공항</option>
                        <option value="BUSAN">부산국제공항</option>

              type="checkbox"

  <script>
    // 카테고리 데이터를 가져와서 트리 구조로 처리하는 함수
    document
      .getElementById("mainCategory")
      .addEventListener("change", function () {
        document.getElementById("hiddenMainCategoryId").value = this.value;
      });

    function loadCategories() {
      fetch("/api/categories")
        .then((response) => response.json())
        .then((data) => {
          console.log("API 응답 데이터:", data);
          const mainCategorySelect = document.getElementById("mainCategory");
          resetSelect(mainCategorySelect, "대분류"); // 초기화

          data.forEach((mainCategory) => {
            const option = document.createElement("option");
            option.value = mainCategory.id;
            option.textContent = mainCategory.name;
            mainCategorySelect.appendChild(option);
          });

          // 대분류 변경 시 중분류 로딩
          mainCategorySelect.addEventListener("change", function () {
            const selectedMainCategory = data.find((c) => c.id == this.value);
            loadSubCategories(selectedMainCategory?.children || []);
          });
        })
        .catch((error) =>
          console.error("카테고리 데이터를 가져오는데 실패했습니다:", error)
        );
    }

    // 중분류 로딩
    function loadSubCategories(subCategories) {
      const subCategorySelect = document.getElementById("subCategory");
      resetSelect(subCategorySelect, "중분류"); // 초기화

      const smallCategorySelect = document.getElementById("smallCategory");
      resetSelect(smallCategorySelect, "소분류"); // 중분류가 바뀌면 소분류도 초기화

      subCategories.forEach((subCategory) => {
        const option = document.createElement("option");
        option.value = subCategory.id;
        option.textContent = subCategory.name;
        subCategorySelect.appendChild(option);
      });

      // 중분류 변경 시 소분류 로딩
      subCategorySelect.addEventListener("change", function () {
        const selectedSubCategory = subCategories.find(
          (c) => c.id == this.value
        );
        loadSmallCategories(selectedSubCategory?.children || []);
      });
    }

    // 소분류 로딩
    function loadSmallCategories(smallCategories) {
      const smallCategorySelect = document.getElementById("smallCategory");
      resetSelect(smallCategorySelect, "소분류"); // 초기화

      smallCategories.forEach((smallCategory) => {
        const option = document.createElement("option");
        option.value = smallCategory.id;
        option.textContent = smallCategory.name;
        smallCategorySelect.appendChild(option);
      });
    }

    // 셀렉트 박스를 초기화하는 함수
    function resetSelect(selectElement, placeholderText) {
      selectElement.innerHTML = ""; // 기존 옵션 초기화
      const defaultOption = document.createElement("option");
      defaultOption.value = "";
      defaultOption.textContent = `-- ${placeholderText} --`;
      defaultOption.disabled = true;
      defaultOption.selected = true;
      selectElement.appendChild(defaultOption);
    }

    // 페이지 로드 시 대분류 로딩
    document.addEventListener("DOMContentLoaded", loadCategories);
    document.addEventListener("DOMContentLoaded", function () {
      const checkboxes = document.querySelectorAll("input[type=checkbox]");

      checkboxes.forEach((checkbox) => {
        checkbox.addEventListener("change", function () {
          // 체크되었으면 true, 아니면 hidden input을 추가하여 false 값 전송
          if (!this.checked) {
            let hiddenInput = document.createElement("input");
            hiddenInput.type = "hidden";
            hiddenInput.name = this.name;
            hiddenInput.value = "false";
            this.parentNode.appendChild(hiddenInput);
          } else {
            let hiddenInput = document.querySelector(
              `input[type=hidden][name="${this.name}"]`
            );
            if (hiddenInput) hiddenInput.remove(); // 체크 시 기존 hidden input 제거
          }
        });
      });
    });

    // 마지막 카테고리를 설정하면 동적으로 공항 목록 불러옴
    document
      .getElementById("smallCategory")
      .addEventListener("change", function () {
        const categoryId = this.value;

        fetch(`/api/airports/category/${categoryId}`)
          .then((res) => res.json())
          .then((airports) => {
            console.log("받은 공항 응답:", airports);
            const airportSelect = document.getElementById("arrivalPointOut");
            const airportSelectReturn = document.getElementById(
              "departurePointReturn"
            );
            airportSelect.innerHTML = "";
            airportSelectReturn.innerHTML = "";

            const defaultOption1 = document.createElement("option");
            defaultOption1.value = "";
            defaultOption1.textContent = "-- 공항 선택 --";
            defaultOption1.disabled = true;
            defaultOption1.selected = true;
            airportSelect.appendChild(defaultOption1);

            const defaultOption2 = document.createElement("option");
            defaultOption2.value = "";
            defaultOption2.textContent = "-- 공항 선택 --";
            defaultOption2.disabled = true;
            defaultOption2.selected = true;
            airportSelectReturn.appendChild(defaultOption2);

            airports.forEach((airport) => {
              const option = document.createElement("option");
              option.value = airport.id;
              option.textContent = airport.name;
              airportSelect.appendChild(option.cloneNode(true));
              airportSelectReturn.appendChild(option.cloneNode(true));
            });
          })
          .catch((error) => {
            console.error("공항 정보를 불러오는데 실패했습니다:", error);
          });
      });

    // 출국 도착 공항을 선택하면 귀국 출발 공항 자동 선택
    document
      .getElementById("arrivalPointOut")
      .addEventListener("change", function () {
        const selectValue = this.value;
        const returnSelect = document.getElementById("departurePointReturn");
        returnSelect.value = selectValue;
      });

    document
      .getElementById("departurePointOut")
      .addEventListener("change", function () {
        const selectValue = this.value;
        const returnSelect = document.getElementById("arrivalPointReturn");
        returnSelect.value = selectValue;
      });

    // 폼 제출 전 검증 (임시)
    function doAction() {
      let hotelName = document.getElementById("hotelName");
      let flightNumberReturn = document.querySelectorAll(
        'input[name$=".details.flightNumberReturn"]'
      );

      if (hotelName.value.trim() === "") {
        alert("호텔명을 입력하세요");
        return false;
      }

      if (!flightNumberReturn || flightNumberReturn.length === 0) {
        alert("항공편 자동 추가를 눌러 여행일정을 추가하세요");
        console.log("⚠️ 항공편 번호 input이 아직 없음");
        return false;
      }
      return true;
    }

    // 가격 자동 계산 함수
    function updatePrices() {
      const adultPrice =
        parseFloat(document.getElementById("adultPrice").value) || 0;
      const fuelSurcharge =
        parseFloat(document.getElementById("fuelSurcharge").value) || 0;

      // 아동 및 유아 가격 계산
      const childPrice = adultPrice.toFixed(0);
      const babyPrice = (adultPrice * 0.1).toFixed(0);

      // 유류할증료 포함 가격 계산
      const fuelSurchargeIncluded = (adultPrice + fuelSurcharge).toFixed(0);

      // 값 세팅
      document.getElementById("childPrice").value = childPrice;
      document.getElementById("babyPrice").value = babyPrice;
      document.getElementById("fuelSurchargeIncluded").value =
        fuelSurchargeIncluded;
    }

    // 성인 가격, 유류할증료 입력 시 하나의 함수로 처리
    document
      .getElementById("adultPrice")
      .addEventListener("input", updatePrices);
    document
      .getElementById("fuelSurcharge")
      .addEventListener("input", updatePrices);

    // 여행 일정 자동 추가
    function generateFlights() {
      const setStart = document.getElementById("setStart").value;
      const setLast = document.getElementById("setLast").value;

      const period = Number(document.getElementById("period").value);
      const departurePointOut =
        document.getElementById("departurePointOut").value;
      const arrivalPointOut = document.getElementById("arrivalPointOut").value;
      const airlineOut = document.getElementById("airlineOut").value;
      const departureDateOut =
        document.getElementById("departureDateOut").value;
      const arrivalDateOut = document.getElementById("arrivalDateOut").value;
      const flightNumberOut = document.getElementById("flightNumberOut").value;
      const departureTimeOut =
        document.getElementById("departureTimeOut").value;
      const arrivalTimeOut = document.getElementById("arrivalTimeOut").value;
      const departurePointReturn = document.getElementById(
        "departurePointReturn"
      ).value;
      const arrivalPointReturn =
        document.getElementById("arrivalPointReturn").value;
      const airlineReturn = document.getElementById("airlineReturn").value;
      const departureDateReturn = document.getElementById(
        "departureDateReturn"
      ).value;
      const arrivalDateReturn =
        document.getElementById("arrivalDateReturn").value;
      const flightNumberReturn =
        document.getElementById("flightNumberReturn").value;
      const departureTimeReturn = document.getElementById(
        "departureTimeReturn"
      ).value;
      const arrivalTimeReturn =
        document.getElementById("arrivalTimeReturn").value;

      if (
        !setStart ||
        !setLast ||
        !period ||
        !departurePointOut ||
        !arrivalPointOut ||
        !airlineOut ||
        !departureDateOut ||
        // !arrivalDateOut ||
        !flightNumberOut ||
        !departureTimeOut ||
        !arrivalTimeOut ||
        !departurePointReturn ||
        !arrivalPointReturn ||
        !airlineReturn ||
        !departureDateReturn ||
        // !arrivalDateReturn ||
        !flightNumberReturn ||
        !departureTimeReturn ||
        !arrivalTimeReturn
      ) {
        alert("모든 항목을 입력해야합니다");
        return;
      }

      function deleteFlight() {
        const table = document.getElementById("flightTable");
        table.innerHTML = "";
      }
      window.deleteFlight = deleteFlight;

      function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      let startDate = new Date(setStart);
      let endDate = new Date(setLast);

      for (
        let sd = new Date(startDate.getTime());
        sd <= endDate;
        sd.setDate(sd.getDate() + 1)
      ) {
        const sd2 = new Date(startDate.getTime());
        sd2.setDate(sd.getDate() + period - 1);

        const table = document.getElementById("flightTable");
        // 테이블 개수만큼 index 추가
        const rowCount = table.rows.length;
        console.log(rowCount);
        const formattedDate = formatDate(sd);
        const formattedDateEnd = formatDate(sd2);
        const row = document.createElement("tr");
        row.innerHTML = `
            <td><input type="text" readonly name="packageSchedule[${rowCount}].departureDateOut" value="${formattedDate}"></td>
            <td><button type="button" onclick="removeRow(this)">삭제</button></td>
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.departurePointOutId" value="${departurePointOut}">
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.arrivalPointOutId" value="${arrivalPointOut}">
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.arrivalPointReturnId" value="${arrivalPointReturn}">
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.airlineOutId" value="${airlineOut}">
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.airlineReturnId" value="${airlineReturn}">
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.flightNumberOut" value="${flightNumberOut}"></td>
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.departureTimeOut" value="${departureTimeOut}"></td>
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.arrivalTimeOut" value="${arrivalTimeOut}"></td>
            <td><input type="hidden" name="packageSchedule[${rowCount}].departureDateReturn" value="${formattedDateEnd}"></td>
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.departurePointReturnId" value="${departurePointReturn}">
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.flightNumberReturn" value="${flightNumberReturn}""></td>
            <td><input type="hidden" name="packageSchedule[${rowCount}].details.departureTimeReturn" value="${departureTimeReturn}"></td>              <td><input type="hidden" name="packageSchedule[${rowCount}].details.arrivalTimeReturn" value="${arrivalTimeReturn}"></td>
            <td><input type="hidden" name="packageSchedule[${rowCount}].arrivalDateOut" value="${formattedDate}"></td>
            <td><input type="hidden" name="packageSchedule[${rowCount}].arrivalDateReturn" value="${formattedDateEnd}" ></td>
            `;
        table.appendChild(row);
      }
    }
    // 행 삭제
    function removeRow(button) {
      const row = button.parentNode.parentNode;
      row.parentNode.removeChild(row);
      updateRowIndexes();
    }
    // 행 삭제 후 index 재정렬
    function updateRowIndexes() {
      const rows = document.querySelectorAll("#flightTable tr");

      rows.forEach((row, index) => {
        const inputs = row.querySelectorAll("input, select");
        inputs.forEach((input) => {
          if (input.name) {
            input.name = input.name.replace(/\[\d+\]/, `[${index}]`);
          }
        });
      });
    }

    // 이미지 관련
    let newImageIndex = { subImage: 0, descImage: 0 }; // 새 이미지의 고유 ID 관리

    // 새 이미지 미리보기 및 삭제 기능 (서브, 설명 이미지 공용)
    function previewMultipleImages(event, previewId, maxImages, type) {
      let previewContainer = document.getElementById(previewId);
      let files = event.target.files;

      if (!previewContainer || !files) return;

      for (let i = 0; i < files.length; i++) {
        if (previewContainer.childElementCount >= maxImages) {
          alert(`최대 ${maxImages}개의 이미지만 업로드할 수 있습니다.`);
          break;
        }

        let file = files[i];
        let reader = new FileReader();
        let currentIndex = newImageIndex[type]++; // 해당 타입(subImage, descImage)의 새로운 이미지 인덱스 증가

        reader.onload = function (e) {
          // 새 이미지 컨테이너 추가
          let imageContainer = document.createElement("div");
          imageContainer.classList.add("image-container");
          imageContainer.classList.add(`${type}-image-container`);
          imageContainer.id = `new${type}-${currentIndex}`;

          // 이미지 추가
          let img = document.createElement("img");
          img.src = e.target.result;
          img.classList.add("thumbnail");

          // 삭제 버튼 추가
          let deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.innerHTML =
            '<i class="fa-solid fa-square-xmark" style="color: #ff0000;"></i>';
          deleteButton.className = "btn-delete";

          deleteButton.onclick = function () {
            deleteNewImage(currentIndex, type);
          };

          imageContainer.appendChild(img);
          imageContainer.appendChild(deleteButton);
          previewContainer.appendChild(imageContainer);
        };

        reader.readAsDataURL(file);
      }
    }

    // 새로 추가한 이미지 삭제 (서브, 설명 이미지 공용)
    function deleteNewImage(index, type) {
      let imageContainer = document.getElementById(`new${type}-${index}`);
      if (imageContainer) {
        imageContainer.remove(); // 미리보기에서 삭제
      }

      // 파일 선택 input에서도 제거 (브라우저에서 직접 수정 불가 -> 새롭게 선택하도록 유도)
      let fileInput = document.getElementById(type);
      fileInput.value = ""; // 선택된 파일 초기화
    }

    function previewSingleImage(event, previewId, inputId) {
      let file = event.target.files[0];
      let previewContainer = document.getElementById(previewId);
      previewContainer.innerHTML = ""; // 미리보기 이미지 보여줄 공간

      if (file) {
        let reader = new FileReader();
        reader.onload = function (e) {
          // 이미지 및 버튼을 감쌀 컨테이너 div 생성
          let imageContainer = document.createElement("div");
          imageContainer.classList.add("image-container"); // 클래스 추가

          let imgElement = document.createElement("img");
          imgElement.src = e.target.result;
          imgElement.classList.add("thumbnail");

          // 삭제 버튼 추가
          let deleteButton = document.createElement("button");
          deleteButton.innerHTML =
            '<i class="fa-solid fa-square-xmark" style="color: #ff0000;"></i>';
          deleteButton.className = "btn-delete";
          deleteButton.onclick = function () {
            imageContainer.remove(); // 미리보기 삭제
            document.getElementById(inputId).value = ""; // input 초기화
          };

          imageContainer.appendChild(imgElement);
          imageContainer.appendChild(deleteButton);
          previewContainer.appendChild(imageContainer); // 컨테이너 추가
        };
        reader.readAsDataURL(file);
      }
    }
    // 항공사
    fetch("/api/airlines")
      .then((response) => response.json())
      .then((data) => {
        const selectOut = document.getElementById("airlineOut");
        const selectReturn = document.getElementById("airlineReturn");
        data.forEach((airline) => {
          const option = document.createElement("option");
          option.value = airline.id;
          option.textContent = airline.name;
          selectOut.appendChild(option);
        });
        data.forEach((airline) => {
          const option = document.createElement("option");
          option.value = airline.id;
          option.textContent = airline.name;
          selectReturn.appendChild(option);
        });
      })
      .catch((error) => console.error("항공사 목록 로딩 실패:", error));
    console.log(airlineReturn.value);
  </script>

  <script src="https://uicdn.toast.com/tui.date-picker/latest/tui-date-picker.js"></script>
  <link
    rel="stylesheet"
    href="https://uicdn.toast.com/tui.date-picker/latest/tui-date-picker.css" />

  <script th:inline="none">
    const fullyBooked = [];
    const weekdays = ["일", "월", "화", "수", "목", "금", "토"];

    function formatDateWithWeekday(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const weekday = weekdays[date.getDay()];
      return `${year}.${month}.${day}(${weekday})`;
    }

    // setStart (사용자가 설정하는 시작일) DatePicker
    const datePickerSetStart = new tui.DatePicker("#tui-datepicker-setStart", {
      input: {
        element: document.getElementById("setStart"),
        format: "yyyy.MM.dd",
      },
      language: "ko",
      selectableRanges: [[new Date(), new Date("2030-12-31")]],
    });

    // setLast (사용자가 설정하는 종료일) DatePicker
    const datePickerSetLast = new tui.DatePicker("#tui-datepicker-setLast", {
      input: {
        element: document.getElementById("setLast"),
        format: "yyyy.MM.dd",
      },
      language: "ko",
      selectableRanges: [[new Date(), new Date("2030-12-31")]],
    });

    // 출발일 DatePicker
    const datePickerOut = new tui.DatePicker("#tui-datepicker-out", {
      input: {
        element: document.getElementById("departureDateOut"),
        format: "yyyy.MM.dd",
      },
      language: "ko",
      selectableRanges: [[new Date(), new Date("2030-12-31")]],
      disabledDate: (date) =>
        fullyBooked.includes(date.toISOString().split("T")[0]),
    });

    // 귀국일 DatePicker
    const datePickerReturn = new tui.DatePicker("#tui-datepicker-return", {
      input: {
        element: document.getElementById("departureDateReturn"),
        format: "yyyy.MM.dd",
      },
      language: "ko",
      selectableRanges: [[new Date(), new Date("2030-12-31")]],
      disabledDate: (date) =>
        fullyBooked.includes(date.toISOString().split("T")[0]),
    });

    // setStart 변경 시 출발일 및 귀국일 계산
    datePickerSetStart.on("change", () => {
      const startDate = datePickerSetStart.getDate();
      const period = Number(document.getElementById("period").value);

      if (!startDate || isNaN(period)) return;

      // 출발일 반영
      datePickerOut.setDate(startDate);
      document.getElementById("departureDateOut").value =
        formatDateWithWeekday(startDate);

      // 귀국일 계산 및 반영
      const returnDate = new Date(startDate);
      returnDate.setDate(returnDate.getDate() + period - 1);
      datePickerReturn.setDate(returnDate);
      document.getElementById("departureDateReturn").value =
        formatDateWithWeekday(returnDate);
    });

    // setLast를 수동으로 선택한 경우 귀국일 직접 지정
    datePickerSetLast.on("change", () => {
      const endDate = datePickerSetLast.getDate();
      if (!endDate) return;

      datePickerReturn.setDate(endDate);
      document.getElementById("departureDateReturn").value =
        formatDateWithWeekday(endDate);
    });

    // 출발일 수동 선택 시에도 포맷 적용
    datePickerOut.on("change", () => {
      const date = datePickerOut.getDate();
      document.getElementById("departureDateOut").value =
        formatDateWithWeekday(date);
    });

    // 귀국일 수동 선택 시에도 포맷 적용
    datePickerReturn.on("change", () => {
      const date = datePickerReturn.getDate();
      document.getElementById("departureDateReturn").value =
        formatDateWithWeekday(date);
    });
  </script>
