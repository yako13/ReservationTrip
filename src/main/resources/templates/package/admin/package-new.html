  <script>
    // 카테고리 데이터를 가져와서 트리 구조로 처리하는 함수
    document
      .getElementById("mainCategory")
      .addEventListener("change", function () {
        document.getElementById("hiddenMainCategoryId").value = this.value;
      });

    function loadCategories() {
      fetch("/api/categories")
        .then((response) => response.json())
        .then((data) => {
          console.log("API 응답 데이터:", data);
          const mainCategorySelect = document.getElementById("mainCategory");
          resetSelect(mainCategorySelect, "대분류"); // 초기화

          data.forEach((mainCategory) => {
            const option = document.createElement("option");
            option.value = mainCategory.id;
            option.textContent = mainCategory.name;
            mainCategorySelect.appendChild(option);
          });

          // 대분류 변경 시 중분류 로딩
          mainCategorySelect.addEventListener("change", function () {
            const selectedMainCategory = data.find((c) => c.id == this.value);
            loadSubCategories(selectedMainCategory?.children || []);
          });
        })
        .catch((error) =>
          console.error("카테고리 데이터를 가져오는데 실패했습니다:", error)
        );
    }

    // 중분류 로딩
    function loadSubCategories(subCategories) {
      const subCategorySelect = document.getElementById("subCategory");
      resetSelect(subCategorySelect, "중분류"); // 초기화

      const smallCategorySelect = document.getElementById("smallCategory");
      resetSelect(smallCategorySelect, "소분류"); // 중분류가 바뀌면 소분류도 초기화

      subCategories.forEach((subCategory) => {
        const option = document.createElement("option");
        option.value = subCategory.id;
        option.textContent = subCategory.name;
        subCategorySelect.appendChild(option);
      });

      // 중분류 변경 시 소분류 로딩
      subCategorySelect.addEventListener("change", function () {
        const selectedSubCategory = subCategories.find(
          (c) => c.id == this.value
        );
        loadSmallCategories(selectedSubCategory?.children || []);
      });
    }

    // 소분류 로딩
    function loadSmallCategories(smallCategories) {
      const smallCategorySelect = document.getElementById("smallCategory");
      resetSelect(smallCategorySelect, "소분류"); // 초기화

      smallCategories.forEach((smallCategory) => {
        const option = document.createElement("option");
        option.value = smallCategory.id;
        option.textContent = smallCategory.name;
        smallCategorySelect.appendChild(option);
      });
    }

    // 셀렉트 박스를 초기화하는 함수
    function resetSelect(selectElement, placeholderText) {
      selectElement.innerHTML = ""; // 기존 옵션 초기화
      const defaultOption = document.createElement("option");
      defaultOption.value = "";
      defaultOption.textContent = `-- ${placeholderText} --`;
      defaultOption.disabled = true;
      defaultOption.selected = true;
      selectElement.appendChild(defaultOption);
    }

    // 페이지 로드 시 대분류 로딩
    document.addEventListener("DOMContentLoaded", loadCategories);
    document.addEventListener("DOMContentLoaded", function () {
      const checkboxes = document.querySelectorAll("input[type=checkbox]");

      checkboxes.forEach((checkbox) => {
        checkbox.addEventListener("change", function () {
          // 체크되었으면 true, 아니면 hidden input을 추가하여 false 값 전송
          if (!this.checked) {
            let hiddenInput = document.createElement("input");
            hiddenInput.type = "hidden";
            hiddenInput.name = this.name;
            hiddenInput.value = "false";
            this.parentNode.appendChild(hiddenInput);
          } else {
            let hiddenInput = document.querySelector(
              `input[type=hidden][name="${this.name}"]`
            );
            if (hiddenInput) hiddenInput.remove(); // 체크 시 기존 hidden input 제거
          }
        });
      });
    });

    function doAction() {
      let hotelName = document.getElementById("hotelName");
      let flightNumberReturn = document.querySelectorAll(
        'input[name$=".details.flightNumberReturn"]'
      );

      if (hotelName.value.trim() === "") {
        alert("호텔명을 입력하세요");
        return false;
      }

      if (!flightNumberReturn || flightNumberReturn.length === 0) {
        alert("항공편 자동 추가를 눌러 여행일정을 추가하세요");
        console.log("⚠️ 항공편 번호 input이 아직 없음");
        return false;
      }
      alert("qw");
      return true;
    }

    // 시작 날짜와 같은 값을 부여
    document.getElementById("setStart").addEventListener("change", function () {
      const setStart = document.getElementById("setStart").value;
      const period = Number(document.getElementById("period").value);
      let returnDate = new Date(setStart);
      returnDate.setDate(returnDate.getDate() + period - 1);
      console.log(returnDate);
      const arrivalReturnDate = returnDate.toISOString().split("T")[0];

      document.getElementById("departureDateOut").value = this.value;
      // document.getElementById("arrivalDateOut").value = this.value;
      document.getElementById("departureDateReturn").value = arrivalReturnDate;
      // document.getElementById("arrivalDateReturn").value = this.value;
    });

    function generateFlights() {
      const setStart = document.getElementById("setStart").value;
      const setLast = document.getElementById("setLast").value;

      const period = Number(document.getElementById("period").value);
      const departurePointOut =
        document.getElementById("departurePointOut").value;
      const arrivalPointOut = document.getElementById("arrivalPointOut").value;
      const airlineOut = document.getElementById("airlineOut").value;
      const departureDateOut =
        document.getElementById("departureDateOut").value;
      const arrivalDateOut = document.getElementById("arrivalDateOut").value;
      const flightNumberOut = document.getElementById("flightNumberOut").value;
      const departureTimeOut =
        document.getElementById("departureTimeOut").value;
      const arrivalTimeOut = document.getElementById("arrivalTimeOut").value;
      const departurePointReturn = document.getElementById(
        "departurePointReturn"
      ).value;
      const arrivalPointReturn =
        document.getElementById("arrivalPointReturn").value;
      const airlineReturn = document.getElementById("airlineReturn").value;
      const departureDateReturn = document.getElementById(
        "departureDateReturn"
      ).value;
      const arrivalDateReturn =
        document.getElementById("arrivalDateReturn").value;
      const flightNumberReturn =
        document.getElementById("flightNumberReturn").value;
      const departureTimeReturn = document.getElementById(
        "departureTimeReturn"
      ).value;
      const arrivalTimeReturn =
        document.getElementById("arrivalTimeReturn").value;

      if (
        !setStart ||
        !setLast ||
        !period ||
        !departurePointOut ||
        !arrivalPointOut ||
        !airlineOut ||
        !departureDateOut ||
        // !arrivalDateOut ||
        !flightNumberOut ||
        !departureTimeOut ||
        !arrivalTimeOut ||
        !departurePointReturn ||
        !arrivalPointReturn ||
        !airlineReturn ||
        !departureDateReturn ||
        // !arrivalDateReturn ||
        !flightNumberReturn ||
        !departureTimeReturn ||
        !arrivalTimeReturn
      ) {
        alert("모든 항목을 입력해야합니다");
        return;
      }

      function deleteFlight() {
        const table = document.getElementById("flightTable");
        table.innerHTML = "";
      }
      window.deleteFlight = deleteFlight;

      let startDate = new Date(setStart);
      let endDate = new Date(setLast);

      for (
        let sd = new Date(startDate),
          sd2 = new Date(startDate.setDate(startDate.getDate() + period - 1));
        sd <= endDate;
        sd.setDate(sd.getDate() + 1), sd2.setDate(sd2.getDate() + 1)
      ) {
        const table = document.getElementById("flightTable");
        // 테이블 개수만큼 index 추가
        const rowCount = table.rows.length;
        console.log(rowCount);
        const formattedDate = sd.toISOString().split("T")[0];
        const formattedDateEnd = sd2.toISOString().split("T")[0];
        const row = document.createElement("tr");
        row.innerHTML = `
            <td><input type="date" name="packageSchedule[${rowCount}].departureDateOut" value="${formattedDate}"></td>
            <td><select name="packageSchedule[${rowCount}].details.departurePointOut">
              <option value="GIMPO" ${
                departurePointOut === "GIMPO" ? "selected" : ""
              }>김포국제공항</option>
              <option value="INCHEON" ${
                departurePointOut === "INCHEON" ? "selected" : ""
              }>인천국제공항</option>
              <option value="DAEGU" ${
                departurePointOut === "DAEGU" ? "selected" : ""
              }>대구국제공항</option>
              <option value="BUSAN" ${
                departurePointOut === "BUSAN" ? "selected" : ""
              }>부산국제공항</option></select></td>
            <td><select name="packageSchedule[${rowCount}].details.arrivalPointOut">
              <option value="NARITA" ${
                arrivalPointOut === "NARITA" ? "selected" : ""
              }>나리타국제공항</option>
              <option value="KANSAI" ${
                arrivalPointOut === "KANSAI" ? "selected" : ""
              }>간사이국제공항</option></select></td>
            <td><select name="packageSchedule[${rowCount}].details.airlineOut">
              <option value="AIR_SEOUL" ${
                airlineOut === "AIR_SEOUL" ? "selected" : ""
              }>에어서울</option>
              <option value="TWAY_AIR" ${
                airlineOut === "TWAY_AIR" ? "selected" : ""
              }>티웨이항공</option>
              <option value="AIR_BUSAN" ${
                airlineOut === "AIR_BUSAN" ? "selected" : ""
              }>에어부산</option>
              <option value="JEJU_AIR" ${
                airlineOut === "JEJU_AIR" ? "selected" : ""
              }>제주항공</option>
              <option value="ASIANA_AIR ${
                airlineOut === "ASIANA_AIR" ? "selected" : ""
              }">아시아나항공</option>
              <option value="KOREAN_AIR" ${
                airlineOut === "KOREAN_AIR" ? "seleted" : ""
              }>대한항공</option></select></td>
              <td><input type="text" name="packageSchedule[${rowCount}].details.flightNumberOut" value="${flightNumberOut}"></td>
              <td><input type="time" name="packageSchedule[${rowCount}].details.departureTimeOut" value="${departureTimeOut}"></td>
              <td><input type="time" name="packageSchedule[${rowCount}].details.arrivalTimeOut" value="${arrivalTimeOut}"></td>
              <td><input type="date" name="packageSchedule[${rowCount}].departureDateReturn" value="${formattedDateEnd}">
              <td><select name="packageSchedule[${rowCount}].details.departurePointReturn">
                <option value="NARITA" ${
                  departurePointReturn === "NARITA" ? "selected" : ""
                }>나리타국제공항</option>
                <option value="KANSAI" ${
                  departurePointReturn === "KANSAI" ? "selected" : ""
                }>간사이국제공항</option></select></td>
              <td><select name="packageSchedule[${rowCount}].details.arrivalPointReturn">
                <option value="GIMPO" ${
                  arrivalPointReturn === "GIMPO" ? "selected" : ""
                }>김포국제공항</option>
                <option value="INCHEON" ${
                  arrivalPointReturn === "INCHEON" ? "selected" : ""
                }>인천국제공항</option>
                <option value="DAEGU" ${
                  arrivalPointReturn === "DAEGU" ? "selected" : ""
                }>대구국제공항</option>
                <option value="BUSAN" ${
                  arrivalPointReturn === "BUSAN" ? "selected" : ""
                }>부산국제공항</option></select></td>
              <td><select name="packageSchedule[${rowCount}].details.airlineReturn">
                <option value="AIR_SEOUL" ${
                  airlineReturn === "AIR_SEOUL" ? "selected" : ""
                }>에어서울</option>
                <option value="TWAY_AIR" ${
                  airlineReturn === "TWAY_AIR" ? "selected" : ""
                }>티웨이항공</option>
                <option value="AIR_BUSAN" ${
                  airlineReturn === "AIR_BUSAN" ? "selected" : ""
                }>에어부산</option>
                <option value="JEJU_AIR" ${
                  airlineReturn === "JEJU_AIR" ? "selected" : ""
                }>제주항공</option>
                <option value="ASIANA_AIR ${
                  airlineReturn === "ASIANA_AIR" ? "selected" : ""
                }">아시아나항공</option>
                <option value="KOREAN_AIR" ${
                  airlineReturn === "KOREAN_AIR" ? "seleted" : ""
                }>대한항공</option></select></td>
              <td><input type=text name="packageSchedule[${rowCount}].details.flightNumberReturn" value="${flightNumberReturn}""></td>
              <td><input type="time" name="packageSchedule[${rowCount}].details.departureTimeReturn" value="${departureTimeReturn}"></td>
              <td><input type="time" name="packageSchedule[${rowCount}].details.arrivalTimeReturn" value="${arrivalTimeReturn}"></td>
              <td><input type="hidden" name="packageSchedule[${rowCount}].arrivalDateOut" value="${formattedDate}"></td>
              <td><input type="hidden" name="packageSchedule[${rowCount}].arrivalDateReturn" value="${formattedDateEnd}" ></td>
              <td><button type="button" onclick="removeRow(this)">삭제</button></td>`;
        table.appendChild(row);
      }
    }
    // 행 삭제
    function removeRow(button) {
      const row = button.parentNode.parentNode;
      row.parentNode.removeChild(row);
      updateRowIndexes();
    }
    // 행 삭제 후 index 재정렬
    function updateRowIndexes() {
      const rows = document.querySelectorAll("#flightTable tr");

      rows.forEach((row, index) => {
        const inputs = row.querySelectorAll("input, select");
        inputs.forEach((input) => {
          if (input.name) {
            input.name = input.name.replace(/\[\d+\]/, `[${index}]`);
          }
        });
      });
    }
  </script>
</html>
