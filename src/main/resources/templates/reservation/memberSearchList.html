<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" th:href="@{https://uicdn.toast.com/tui.date-picker/latest/tui-date-picker.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/mainPage.css}">
    <link rel="stylesheet" th:href="@{/css/reservation/memberList.css}">
</head>

<body>
    <header th:replace="/fragments/memberHeader::memberHeader"></header>
    <div class="container">
        <div class="titleArea">
            <h2>예약내역</h2>
            <hr>
        </div>
        <form class="formArea" action="/member/reservation/search" method="get" role="search" id="searchForm">
            <div class="radioArea">
                <span id="radioText">기간 조회</span>
                <input type="radio" value="createdAt" id="createdAt" name="searchSelect"
                    th:checked="${searchSelect=='createdAt'}">
                <label for="createdAt">예약일 기준</label>
                <input type="radio" value="startedAt" id="startedAt" name="searchSelect"
                    th:checked="${searchSelect=='startedAt'}">
                <label for="startedAt">출발일 기준</label>
            </div>

            <div class="HanSearchDate">
                <div id="startInput">
                    <input type="text" id="departure-input" name="startDate" readonly th:value="${startDate}">
                </div>
                ~
                <div id="endInput">
                    <input type="text" id="departure-input2" name="endDate" readonly th:value="${endDate}">
                </div>

                <div id="tui-datepicker"></div>
                <div id="tui-datepicker2"></div>
            </div>

            <button type="submit" id="searchBtn">조회</button>
        </form>
        <div>
            <p>총 [[${size}]]건</p>
        </div>
        <div>
            <table class="reservationTable">
                <tr>
                    <th>예약일/예약코드</th>
                    <th>상품명</th>
                    <th>결제 금액</th>
                    <th>인원</th>
                    <th>출발일/귀국일</th>
                    <th>예약상태</th>
                </tr>
                <tr th:if="${reservationList!=null} " th:each="reservation : ${reservationList}"
                    th:onclick="window.location.href='/member/reservation/details/' + [[${reservation.reservationPK}]];">
                    <td><span>[[${reservation.createdAt}]]</span><br> [[${reservation.code}]]</td>
                    <td th:text="${reservation.packageName}"></td>
                    <td>총 [[${reservation.totalPay}]]</td>
                    <td th:text="${reservation.reservationMembers}"></td>
                    <td>[[${reservation.startDate}]] ~ [[${reservation.endDate}]]</td>
                    <td th:text="${reservation.reservationState}">예약완료</td>
                </tr>
            </table>
        </div>
        <div th:if="${size==0}" class="imageArea">
                <img th:src="@{/images/info.svg}" id="infoImage">
                <p>예약내역이 없습니다.</p>
        </div>

    </div>
    <footer th:replace="/fragments/memberFooter::memberFooter"></footer>
    <script src="https://uicdn.toast.com/tui.date-picker/latest/tui-date-picker.js"></script>
    <link rel="stylesheet" href="https://uicdn.toast.com/tui.date-picker/latest/tui-date-picker.css">

    <script th:inline="none">

        const dateInput = document.getElementById('departure-input');
        const dateInput2 = document.getElementById('departure-input2');

        const fullyBooked = [];
        const weekdays = ['일', '월', '화', '수', '목', '금', '토'];

        function scrollToCenter(el) {
            const rect = el.getBoundingClientRect();
            const offset = rect.top + window.scrollY - (window.innerHeight / 2) + (rect.height / 2) + 100;
            window.scrollTo({
                top: offset,
                behavior: 'smooth'
            });
        }

        if (dateInput) {
            dateInput.addEventListener('click', () => scrollToCenter(dateInput));
        }
        if (dateInput2) {
            dateInput2.addEventListener('click', () => scrollToCenter(dateInput2));
        }

        function parseDateString(str) {
            if (!str) return null;
            const cleaned = str.replace(/\./g, '-').trim(); // "2025.04.03" → "2025-04-03"
            return new Date(cleaned);
        }

        function formatWithWeekday(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const weekday = weekdays[date.getDay()];
            return `${year}.${month}.${day}`;
        }

        const initialStart = parseDateString(dateInput.value);
        const initialEnd = parseDateString(dateInput2.value);

        const datePicker = new tui.DatePicker('#tui-datepicker', {
            input: {
                element: dateInput,
                format: 'yyyy.MM.dd'
            },
            language: 'ko',
            date: initialStart,
            selectableRanges: [[new Date('2024-01-01'), new Date('2030-12-31')]],
            disabledDate: date => fullyBooked.includes(date.toISOString().split('T')[0])
        });

        datePicker.on('change', () => {
            const selected = datePicker.getDate();
            dateInput.value = formatWithWeekday(selected);
        });

        const datePicker2 = new tui.DatePicker('#tui-datepicker2', {
            input: {
                element: dateInput2,
                format: 'yyyy.MM.dd'
            },
            language: 'ko',
            date: initialEnd,
            selectableRanges: [[new Date('2024-01-01'), new Date('2030-12-31')]],
            disabledDate: date => fullyBooked.includes(date.toISOString().split('T')[0])
        });

        datePicker2.on('change', () => {
            const selected = datePicker2.getDate();
            dateInput2.value = formatWithWeekday(selected);
        });

        const searchBtn = document.getElementById("searchBtn");
        const searchForm = document.getElementById("searchForm");

        searchBtn.addEventListener("click", function (e) {
            e.preventDefault();
            if (parseInt(replaceDate(dateInput.value)) <= parseInt(replaceDate(dateInput2.value))) {
                searchForm.submit();
            } else {
                alert("조회 종료일보다 조회 시작일이 더 큽니다.");
            }
        });

        function replaceDate(date) {
            if (!date) return "";
            const replaceText = date.split('(')[0]; // 요일 제거
            return replaceText.replaceAll(".", "");
        }

    </script>
</body>

</html>
