<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약</title>

    <link rel="stylesheet" th:href="@{/css/mainPage.css}">
    <link rel="stylesheet" th:href="@{/css/reservation/reservationComplete.css}">
    <style>
        body {
            background-color: #efefef;
            margin: 0;

        }
    </style>

</head>

<body>

    <!-- 헤더 시작 -->

    <!-- <header th:replace="/fragments/memberHeader::memberHeader"></header> -->
    <!-- 헤더 끝 -->


    <!-- 메인 시작 -->

    <div class="HanCkSubmitMain">

        <div class="HanCkSubmit">

            <div class="HanCkSubmitMid">

                <div>
                    <img th:src="@{/images/checkmarkRes.svg}" alt="" width="150px" height="150px">
                </div>

                <div class="HanCkSubmitMidTitle">

                    <p>예약 완료</p>
                </div>

                <hr class="HanHr1">

                <div class="HanResComMidDiv">
                    <div class="HanCkSubmitMidText HanCkSubmitMidFlex">
                        <!-- <p class="HanCkSubmitP1" style="min-width: 50px;">상품명 : </p> -->

                        <div style="max-width: 345px;">
                            <p class="HanCkSubmitP2" th:text="${hanSubmitCompleteDto.packageName}">
                                [출발확정] 오사카 3박 4일</p>

                        </div>
                    </div>

                    <div class="HanCkSubmitMidText HanCheckoutNum">

                        <p class="HanCkSubmitP1">예약번호 : </p>
                        <p th:text="${hanSubmitCompleteDto.code}" class="HanCkSubmitP2">2025030301</p>

                    </div>

                    <div class="HanCkSubmitMidText HanCheckoutNum">

                        <p class="HanCkSubmitP1">출발일 : </p>
                        <p th:text="${hanSubmitCompleteDto.startDate}" class="HanCkSubmitP2">25.01.02(금)</p>

                    </div>

                    <div class="HanCkSubmitMidText HanCkSubmitMidColor">

                        <p class="HanCkSubmitP1">결제금액 : </p>

                        <p class="HanCkSubmitP2" th:text="${hanSubmitCompleteDto.totalPay}">1,000,000원</p>

                    </div>



                </div>





                <div class="HanCkSubmitA">

                    <a class="HanCheckoutList" th:href="@{/member/reservation/list}">예약내역 보기</a>
                    <a class="HanHome" th:href="@{/}">홈으로 가기</a>

                </div>

            </div>

        </div>

    </div>

    <!-- 메인 끝 -->


    <!-- 푸터 시작 -->

    <!-- <footer th:replace="/fragments/memberFooter::memberFooter"></footer> -->

    <!-- 푸터 끝 -->


</body>

</html>
