# data.sql
spring.jpa.defer-datasource-initialization=true
spring,jpa.generate-ddl=true

# Hibernate ??? ??? ?? ???
spring.mvc.hibernate.filter.enable=true

# H2 DB
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MYSQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create, update, validate, none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ?? ??? ?? HTML ?? ?? ?? ??
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/

# file upload size
# ??? ??? ?? ?? ?? ?? (50MB)
spring.servlet.multipart.max-file-size=50MB
# ? ?? ???? ??? ??? ? ?? ?? ?? (500MB)
spring.servlet.multipart.max-request-size=500MB
# ?? ?? ???? ?? ?? (URL? JSESSIONID ?? ??)
server.servlet.session.tracking-modes=cookie

# ?? ?? ?? ?? ??
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n

image.path=C:/productImages/
image.path.directory=/productImages/

# HTTP ?? ??
#logging.level.org.springframework.web=DEBUG


#Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_PASSWORD}
spring.security.oauth2.client.registration.google.scope=profile, email

#Naver OAuth2
spring.security.oauth2.client.registration.naver.client-id=${NAVER_ID}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_PASSWORD}
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:8080/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email,mobile

spring.security.oauth2.client.provider.naver.authorization_uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token_uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user_name_attribute=response

#Kakao OAuth2
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_KEY}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_SECRET_CODE}
spring.security.oauth2.client.registration.kakao.scope=account_email
spring.security.oauth2.client.registration.kakao.client-name=kakao-login
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
#spring.security.oauth2.client.registration.kakao.client-authentication-method=POST kakao? [POST] ?? client_secret_post, client_secret_basic, none ? ??
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id